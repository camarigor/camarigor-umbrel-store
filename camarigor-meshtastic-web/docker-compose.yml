version: "3.7"

services:
  camarigor-meshtastic-web:
    image: ghcr.io/meshtastic/web:latest
    restart: on-failure
    stop_grace_period: 30s
    ports:
      - "9002:8080"
    environment:
      TZ: America/Sao_Paulo
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
