version: "3.7"

services:
  # Seeds a config template under the app data dir on first run, with the right
  # ownership. Secrets live ONLY here on your Umbrel — never in this public repo.
  camarigor-bridge-mqtt-multi-longfast_init:
    image: busybox:stable
    user: "0"
    restart: "no"
    security_opt:
      - no-new-privileges:true
    read_only: true
    command:
      - sh
      - -c
      - |
        mkdir -p /app-data/data
        if [ ! -f /app-data/data/bridge.env ]; then
          {
            echo "# bridge-mqtt-multi-longfast config — fill in the CHANGE_ME values,"
            echo "# then restart this app. This file lives only on your Umbrel."
            echo ""
            echo "# Local broker (the Umbrel mosquitto your Meshtastic device publishes to):"
            echo "LOCAL_MQTT_HOST=CHANGE_ME"
            echo "LOCAL_MQTT_USER=CHANGE_ME"
            echo "LOCAL_MQTT_PASS=CHANGE_ME"
            echo "LOCAL_ROOT=meshdev"
            echo ""
            echo "# Bridge 1 — primary server. Device channel LongFast (no hash rewrite)."
            echo "BRIDGE1_NAME=primary"
            echo "BRIDGE1_LOCAL_CHANNEL=LongFast"
            echo "BRIDGE1_REMOTE_HOST=platform.meshbrasil.com"
            echo "BRIDGE1_REMOTE_PORT=1883"
            echo "BRIDGE1_REMOTE_USER=meshdev"
            echo "BRIDGE1_REMOTE_PASS=large4cats"
            echo "BRIDGE1_REMOTE_ROOT=meshdev"
            echo "BRIDGE1_REMOTE_CHANNEL=LongFast"
            echo ""
            echo "# Bridge 2 — second public server. Device channel LongFastCO (hash rewrite)."
            echo "BRIDGE2_NAME=meshtastic"
            echo "BRIDGE2_LOCAL_CHANNEL=LongFastCO"
            echo "BRIDGE2_REMOTE_HOST=mqtt.meshtastic.org"
            echo "BRIDGE2_REMOTE_PORT=1883"
            echo "BRIDGE2_REMOTE_USER=meshdev"
            echo "BRIDGE2_REMOTE_PASS=large4cats"
            echo "BRIDGE2_REMOTE_ROOT=msh/US/CO"
            echo "BRIDGE2_REMOTE_CHANNEL=LongFast"
            echo "# Some servers (e.g. a regional mqtt.meshtastic.org root) publish"
            echo "# DECODED (plaintext) packets, so encrypted relays are invisible to"
            echo "# their nodes. With this true, the app decrypts outbound packets to"
            echo "# plaintext (public PSK only) and relays their plaintext inbound."
            echo "BRIDGE2_REMOTE_DECODED=true"
          } > /app-data/data/bridge.env
        fi
        chown -R 1000:1000 /app-data
    volumes:
      - ${APP_DATA_DIR}:/app-data

  camarigor-bridge-mqtt-multi-longfast:
    image: ghcr.io/camarigor/bridge-mqtt-multi-longfast:1.4.0
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      camarigor-bridge-mqtt-multi-longfast_init:
        condition: service_completed_successfully
    environment:
      BRIDGE_ENV_FILE: /data/bridge.env
      STATUS_PORT: "8080"
    ports:
      - "9004:8080"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ${APP_DATA_DIR}/data:/data
