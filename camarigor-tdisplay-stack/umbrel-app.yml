dependencies: []
port: 8081
gallery: []
path: ""
releaseNotes: >-
  v1.1.0: env vars inline no compose em vez de env_file (compatibilidade
  com validação Umbrel pre-start). Init container apenas seed de configs
  Telegraf+nginx. Edição pós-install: docker-compose.yml em app-data.


  v1.0.0: Initial release.


  - Imagem custom data-collector (ghcr.io/camarigor/tdisplay-data-collector:1.0.0)
    poller Open-Meteo + paho-mqtt, publica `data/weather/<city>` retained.

  - Imagem custom tdisplay-init (ghcr.io/camarigor/tdisplay-init:1.1.0) roda
    como init container — copia configs Telegraf default + nginx.conf pro
    app-data no primeiro start sem sobrescrever edições do user.

  - Telegraf 1.31-alpine x2 (broker + router SNMP).

  - Nginx alpine pra OTA firmware (porta 8081).

  - Hardening: read_only rootfs + tmpfs + no-new-privileges em todos os
    services.


  IMPORTANTE: Após install, edite as env vars vazias em
  `~/umbrel/app-data/camarigor-tdisplay-stack/docker-compose.yml` e restart.
  Sem isso, os containers entram em loop `restart: on-failure`.
