[agent]
  interval = "30s"
  hostname = "${HOSTNAME}"
  omit_hostname = false
  flush_interval = "10s"
  metric_buffer_limit = 10000

[[inputs.snmp]]
  agents = ["udp://${ROUTER_IP}:161"]
  version = 2
  community = "${SNMP_COMMUNITY}"
  timeout = "5s"
  retries = 2
  name_override = "snmp"

  [[inputs.snmp.field]]
    name = "uptime_seconds"
    oid = "DISMAN-EVENT-MIB::sysUpTimeInstance"
    conversion = "float(2)"

  [[inputs.snmp.field]]
    name = "load1"
    oid = "UCD-SNMP-MIB::laLoad.1"
    conversion = "float"

  [[inputs.snmp.field]]
    name = "load5"
    oid = "UCD-SNMP-MIB::laLoad.2"
    conversion = "float"

  [[inputs.snmp.field]]
    name = "load15"
    oid = "UCD-SNMP-MIB::laLoad.3"
    conversion = "float"

  [[inputs.snmp.field]]
    name = "mem_total_kb"
    oid = "UCD-SNMP-MIB::memTotalReal.0"

  [[inputs.snmp.field]]
    name = "mem_avail_kb"
    oid = "UCD-SNMP-MIB::memAvailReal.0"

  [[inputs.snmp.table]]
    name = "disk"
    oid = "UCD-SNMP-MIB::dskTable"
    [[inputs.snmp.table.field]]
      name = "path"
      oid = "UCD-SNMP-MIB::dskPath"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "used_percent"
      oid = "UCD-SNMP-MIB::dskUsedPercent"

  [[inputs.snmp.table]]
    name = "interface"
    oid = "IF-MIB::ifTable"
    [[inputs.snmp.table.field]]
      name = "ifname"
      oid = "IF-MIB::ifDescr"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "rx_bytes"
      oid = "IF-MIB::ifHCInOctets"
    [[inputs.snmp.table.field]]
      name = "tx_bytes"
      oid = "IF-MIB::ifHCOutOctets"

[[outputs.mqtt]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topic = 'stats/${HOSTNAME}/snmp'
  username = "collector-${HOSTNAME}"
  password = "${MQTT_PASS}"
  qos = 0
  keep_alive = 60
  data_format = "json"
  client_id = "telegraf-router"
