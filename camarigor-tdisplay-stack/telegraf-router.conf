[agent]
  interval = "30s"
  hostname = "${HOSTNAME}"
  omit_hostname = false
  flush_interval = "10s"
  metric_buffer_limit = 10000

# OIDs numéricos (sem dependência de MIBs) — telegraf:*-alpine não inclui
# snmptranslate nem arquivos MIB. Mapeamento:
#   sysUpTimeInstance  → SNMPv2-MIB::sysUpTime.0
#   laLoad.{1,2,3}     → UCD-SNMP-MIB::laLoad.{1,2,3}
#   memTotalReal.0     → UCD-SNMP-MIB::memTotalReal.0
#   memAvailReal.0     → UCD-SNMP-MIB::memAvailReal.0
#   dskPath/UsedPct    → UCD-SNMP-MIB::dskTable
#   ifDescr/HC*Octets  → IF-MIB::ifTable + ifXTable
[[inputs.snmp]]
  agents = ["udp://${ROUTER_IP}:161"]
  version = 2
  community = "${SNMP_COMMUNITY}"
  timeout = "5s"
  retries = 2
  name_override = "snmp"

  [[inputs.snmp.field]]
    name = "uptime_seconds"
    oid = ".1.3.6.1.2.1.1.3.0"
    conversion = "float(2)"

  [[inputs.snmp.field]]
    name = "load1"
    oid = ".1.3.6.1.4.1.2021.10.1.3.1"
    conversion = "float"

  [[inputs.snmp.field]]
    name = "load5"
    oid = ".1.3.6.1.4.1.2021.10.1.3.2"
    conversion = "float"

  [[inputs.snmp.field]]
    name = "load15"
    oid = ".1.3.6.1.4.1.2021.10.1.3.3"
    conversion = "float"

  [[inputs.snmp.field]]
    name = "mem_total_kb"
    oid = ".1.3.6.1.4.1.2021.4.5.0"

  [[inputs.snmp.field]]
    name = "mem_avail_kb"
    oid = ".1.3.6.1.4.1.2021.4.6.0"

  [[inputs.snmp.table]]
    name = "disk"
    oid = ".1.3.6.1.4.1.2021.9"
    [[inputs.snmp.table.field]]
      name = "path"
      oid = ".1.3.6.1.4.1.2021.9.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "used_percent"
      oid = ".1.3.6.1.4.1.2021.9.1.9"

  [[inputs.snmp.table]]
    name = "interface"
    oid = ".1.3.6.1.2.1.2.2"
    [[inputs.snmp.table.field]]
      name = "ifname"
      oid = ".1.3.6.1.2.1.2.2.1.2"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "rx_bytes"
      oid = ".1.3.6.1.2.1.31.1.1.1.6"
    [[inputs.snmp.table.field]]
      name = "tx_bytes"
      oid = ".1.3.6.1.2.1.31.1.1.1.10"

[[outputs.mqtt]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topic = 'stats/${HOSTNAME}/snmp'
  username = "collector-${HOSTNAME}"
  password = "${MQTT_PASS}"
  qos = 0
  keep_alive = 60
  data_format = "json"
  client_id = "telegraf-router"
