[agent]
  interval = "30s"
  hostname = "${HOSTNAME}"
  omit_hostname = false
  flush_interval = "10s"
  metric_buffer_limit = 10000

[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = true
  name_override = "cpu"

[[inputs.mem]]
  name_override = "mem"

[[inputs.disk]]
  # Telegraf usa HOST_MOUNT_PREFIX=/hostfs (env) pra ler o filesystem do host.
  # mount_points lista paths reais do host; aqui pega o rootfs do Umbrel.
  mount_points = ["/"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "squashfs", "nsfs", "cgroup", "cgroup2"]
  name_override = "disk"

[[inputs.net]]
  ignore_protocol_stats = true
  name_override = "net"

[[inputs.system]]
  name_override = "uptime"
  fieldpass = ["uptime"]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  perdevice = false
  total = true
  name_override = "docker"
  taginclude = ["host"]

[[outputs.mqtt]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topic = 'stats/${HOSTNAME}/{{ .PluginName }}'
  username = "collector-${HOSTNAME}"
  password = "${MQTT_PASS}"
  qos = 0
  keep_alive = 60
  data_format = "json"
  client_id = "telegraf-broker"
