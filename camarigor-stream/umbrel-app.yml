manifestVersion: 1
id: camarigor-stream
category: media
name: Stream
version: "1.6.10"
tagline: Complete media stack — Jellyfin, Jellyseerr, *arr, qBittorrent and cross-seed in a single app
icon: https://raw.githubusercontent.com/camarigor/camarigor-umbrel-store/main/camarigor-stream/icon.png
description: >-
  Stream is a complete media automation stack in a single Umbrel app:
  request movies and TV shows through Jellyseerr, downloads happen
  automatically and the content shows up in Jellyfin with pt-BR subtitles.


  Components:

  - Jellyfin (8096): media server with Intel Quick Sync hardware
    acceleration (/dev/dri, HEVC/H.264/AV1 decode).

  - Jellyseerr (5055): Netflix-style request interface, logs in with
    Jellyfin accounts.

  - Sonarr (8989) / Radarr (7878): TV show and movie automation.

  - Bazarr (6767): automatic pt-BR subtitles.

  - Prowlarr (9696): central indexer management (public and private),
    syncs with Sonarr/Radarr.

  - qBittorrent (8082): download client.

  - Byparr (internal): Cloudflare bypass for public indexers
    (FlareSolverr-compatible API, stronger anti-bot engine).

  - cross-seed (internal): re-seeds the same files on other trackers
    (ratio building on private trackers) without re-downloading, via
    hardlinks.

  - Unpackerr (internal): auto-extracts RAR/scene releases (multi-part
    .rNN archives) so Sonarr and Radarr can import them.

  - gluetun (internal): ProtonVPN gateway. qBittorrent routes ALL its
    traffic through this WireGuard tunnel with a kill-switch and
    ProtonVPN port forwarding (P2P servers), so torrents stay connectable
    without leaking the real IP. Requires a ProtonVPN paid plan.


  Data layout (single volume — hardlinks between downloads and library,
  no duplicated disk space):

  - data/torrents/{movies,tv}: downloads

  - data/media/{movies,tv}: library read by Jellyfin


  Post-install setup (detailed in the app README in the store repo):

  1. qBittorrent: grab the temporary password from the logs, change it,
     create the movies/tv categories.

  2. Prowlarr: add indexers + Byparr (Indexer Proxy type "FlareSolverr",
     Host http://byparr:8191) and connect Sonarr/Radarr.

  3. Sonarr/Radarr: root folders /data/media/{tv,movies} + download
     client host gluetun, port 8082 (qBittorrent runs behind the VPN).

  4. Bazarr: Portuguese (Brazil) language profile + providers.

  5. Jellyfin: wizard, libraries /media/{movies,tv}, enable QSV.

  6. Jellyseerr: connect to Jellyfin + Radarr/Sonarr.

  7. cross-seed: edit config/cross-seed/config.js (point qBittorrent to
     gluetun:8082 + Prowlarr Torznab) and restart the app.

  8. VPN (gluetun): generate a ProtonVPN WireGuard config with NAT-PMP
     enabled, write its PrivateKey to config/gluetun/wireguard_private_key
     and its Address to config/gluetun/wireguard_addresses, enable
     qBittorrent "Bypass authentication for clients on localhost", then
     restart the app (see README).
developer: camarigor
website: https://github.com/camarigor/camarigor-umbrel-store
