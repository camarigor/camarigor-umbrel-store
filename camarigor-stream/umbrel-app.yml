path: ""
releaseNotes: >-
  v1.7.0: Route the ENTIRE acquisition stack through the VPN, not just qBittorrent.
  Sonarr, Radarr, Prowlarr, Jellyseerr, Bazarr, Byparr, cross-seed and Threadfin now
  share gluetun's network namespace, so every one of them egresses through the
  WireGuard tunnel and loses network (kill-switch) if the tunnel drops. Their WebUIs
  are published by gluetun and stay reachable at <host>:<port> exactly as before, so
  a reverse proxy pointing at host:port needs no change. Calls between these services
  are now over localhost (download client localhost:8082, Byparr localhost:8191,
  Prowlarr localhost:9696); unpackerr and Jellyfin (on the bridge) reach the in-netns
  services at gluetun:<port>; Seerr reaches Jellyfin at the host LAN IP. The
  qbit-port-sync sidecar was removed -- with a static forwarded port the listen port
  is fixed in qBittorrent's config, so there is nothing to sync. After updating,
  verify the *arr WebUIs and the qBittorrent download-client connection. See README.


  v1.6.16: The VPN provider is now fully generic in the public template -- no
  provider name or reserved port appears in the compose. The provider, the
  WireGuard entry port and the static forwarded port are driven by VPN_PROVIDER,
  VPN_ENDPOINT_PORT and VPN_FORWARDED_PORT in exports.sh (with the WireGuard
  PrivateKey/Address/PresharedKey in config/gluetun/wireguard_* files). Port
  forwarding switched from dynamic NAT-PMP to a STATIC reserved port opened via
  FIREWALL_VPN_INPUT_PORTS, and WIREGUARD_MTU is 1320. Set your values in
  exports.sh + the secret files, then update.


  v1.6.15: Routine image updates. Sonarr 4.0.17.2952-ls313 to 4.0.18.2971-ls315
  (upstream patch). gluetun re-pinned by digest to a newer latest main build
  (2026-06-24, was the 2026-06-14 pin) -- still ahead of the v3.41.1 release,
  whose embedded VPN server list is a stale Feb-2026 snapshot, so it keeps
  the fresher server list and the custom-DNS (#3231) fix. Everything else
  (Jellyfin, Seerr, Radarr, Bazarr, Prowlarr, qBittorrent, Byparr, cross-seed,
  Unpackerr, Threadfin) was already current. gluetun pulls a new image, so the
  update takes a bit longer; verify the VPN and qBittorrent right after updating.


  v1.6.14: Add Threadfin (M3U proxy, pinned by digest = v1.2.37) as optional IPTV
  middleware in front of Jellyfin's Live TV. A raw Xtream/M3U provider playlist can
  be hundreds of thousands of entries (live + the entire VOD catalog), which
  Jellyfin's Live TV cannot index -- playback fails with "Unable to find host to play
  channel". Point Threadfin (web UI on port 34400) at the provider URL, select only
  the channels you want, and it serves a small, clean M3U + XMLTV to Jellyfin. It
  egresses directly (NOT through the VPN, since it is not torrent traffic); config
  persists in config/threadfin. No change to existing services.


  v1.6.13: Pin the WireGuard MTU to 1400 (WIREGUARD_MTU). gluetun's automatic
  Path-MTU discovery (PMTUD) is buggy (gluetun#3108 / #3142): on some VPN
  servers it fails (ICMP blocked on the path), reverts tun0 to a fallback MTU and
  black-holes large packets, collapsing torrent throughput to near zero -- while the
  healthcheck (small packets) keeps passing, so it never auto-recovers and you just
  see slow downloads. A fixed MTU bypasses the discovery and that failure mode. 1400
  is what PMTUD measured working through the tunnel on a good server; a DF-ping to the
  WireGuard endpoint measured the underlying path at a clean 1500, so 1400 sits ~40
  bytes below the 1440 ceiling a 1500 path allows -- proven and with margin. No image
  change.


  v1.6.12: The init service now also mounts ${APP_DATA_DIR}/data at /app-data/data.
  This lets init work when the app's data dir is a SYMLINK to external storage
  (Docker resolves the symlink for this mount), which is the supported way to keep a
  large media library OUTSIDE umbrelOS's Files-app watch path. Background: if the
  bulk media sits inside the app-data dir (e.g. bind-mounted there), umbrelOS's Files
  app recursively watches + THUMBNAILS it (spawning convert/ffmpeg per video file),
  which overloads the umbreld process and wedges its dashboard (the apps themselves
  keep running). Symlinking the data dir to an external mount stops that (umbreld's
  @parcel/watcher does not follow symlinks); this init mount is what makes that
  layout boot cleanly. Harmless (same directory) for normal/bind data layouts. No
  image change.


  v1.6.11: Genericize the template so the published app carries no host-specific
  values. gluetun's DNS resolver, startup healthcheck host and outbound subnets
  are now driven by ${LAN_DNS}, ${VPN_HEALTHCHECK_HOST} and ${VPN_OUTBOUND_SUBNETS}
  with safe public defaults (Cloudflare DNS, cloudflare.com healthcheck, the Umbrel
  Docker subnet only), so it works out of the box. To use your own LAN DNS resolver
  or an internal healthcheck host, set those in
  ~/umbrel/app-data/camarigor-stream/exports.sh — Umbrel sources it before
  docker compose, it stays out of the public repo, and it survives updates (see
  README). Also a full README rewrite: component/version list, networking &
  security model, troubleshooting, updating/backup. No image change; existing
  installs are unaffected as long as exports.sh holds their values.


  v1.6.10: Finish the v1.6.9 DNS fix. v1.6.9 correctly pointed gluetun's DNS at
  the LAN resolver (<lan-dns>), but the startup healthcheck still looped — this
  time with "server misbehaving"/REFUSED instead of "no such host". Root cause
  (proven from inside gluetun's network namespace): gluetun's built-in resolver
  has DNS-REBINDING PROTECTION that REFUSES any answer resolving to a PRIVATE IP.
  The healthcheck host (<healthcheck-host>) is split-horizon and resolves
  to a LAN IP, so gluetun refused it and never went healthy (public names resolved
  fine; querying <lan-dns> directly resolved it fine — only gluetun's resolver
  blocked it). Fix: exempt that host with
  DNS_REBINDING_PROTECTION_EXEMPT_HOSTNAMES=<healthcheck-host>. Set it to
  your own internal healthcheck host. No image change.


  v1.6.9: Fix gluetun stuck looping on its startup healthcheck right after the
  v1.6.8 image bump (app stuck "updating", qBittorrent never starting). The newer
  build made DNS_KEEP_NAMESERVER obsolete and switched to a built-in resolver that
  only forwards single-label "local" names to the LAN DNS — full hostnames (like
  the internal-only healthcheck host <healthcheck-host>) were sent to
  Cloudflare instead, which cannot resolve them, so the startup check looped on
  "no such host" and gluetun never went healthy (qBittorrent and the port-sync
  sidecar then stayed in Created). The good news: the v1.6.8 build also FIXED the
  custom-DNS bug (#3231) that v1.6.2 ran into, so this restores the proper,
  supported config — DNS_UPSTREAM_RESOLVER_TYPE=plain +
  DNS_UPSTREAM_PLAIN_ADDRESSES=<lan-dns>:53 (gluetun now forwards EVERY DNS query
  to the LAN resolver) — and drops the obsolete DNS_KEEP_NAMESERVER. Confirmed the
  LAN DNS resolves the internal host over plaintext before shipping. Change
  <lan-dns> to your own resolver. No image change.


  v1.6.8: Update gluetun to its latest build (pinned by digest, 2026-06-14)
  instead of the v3.41.1 release. There is no stable semver newer than v3.41.1,
  whose EMBEDDED VPN server list is a stale Feb-2026 snapshot — outdated
  server IPs led gluetun to connect to a dead endpoint (silent WireGuard failure
  → zero traffic, recovered only by failover). The newer build carries a fresher
  server list (so PORT_FORWARD_ONLY picks from current P2P/port-forwarding
  servers with valid IPs) and likely the custom-DNS fix (#3231). Pinned by digest
  for reproducibility; bump deliberately. This pulls a new image, so the update
  takes a bit longer.


  v1.6.7: Revert v1.6.6 — put gluetun's ongoing healthcheck back THROUGH the
  tunnel (HEALTH_ICMP_TARGET_IPS=1.1.1.1,8.8.8.8). v1.6.6 pinged the LAN, which
  always answers, so when a VPN server had a silent WireGuard failure
  gluetun reported "healthy" while the tunnel was actually dead — qBittorrent got
  zero traffic and never auto-recovered (happened 2026-06-21). Pinging through the
  tunnel is what detects a dead tunnel and makes gluetun reconnect to a working
  server; the rare transient restart is the price of that auto-recovery (the
  port-sync sidecar reannounces on reconnect, so it self-heals). The startup check
  stays on the internal valid-cert host (<healthcheck-host>) only to avoid the
  startup-window flap. No image changes.


  v1.6.6: Also point gluetun's ONGOING small-check at the LAN
  (HEALTH_ICMP_TARGET_IPS=<lan-dns>) instead of pinging 1.1.1.1/8.8.8.8 through the
  tunnel. After v1.6.5 fixed the startup check, a single transient tunnel ICMP
  drop still caused one VPN restart; pinging the LAN router fully decouples BOTH
  healthchecks from the tunnel, so transient tunnel blips no longer bounce the
  VPN. Trade-off: a genuinely dead VPN is no longer auto-recovered by gluetun
  (the kill-switch still blocks leaks and the port-sync sidecar re-syncs on any
  reconnect). Change to your own LAN IP. No image changes.


  v1.6.5: Finish fixing the gluetun healthcheck so the VPN stops flapping with
  the local DNS. v1.6.4 pointed the startup check at the router IP (<lan-dns>:443)
  but gluetun VERIFIES the TLS certificate, and the router's self-signed cert has
  no IP SAN → it still flapped. Point the check at an internal-only hostname with
  a publicly-valid cert (HEALTH_TARGET_ADDRESSES=<healthcheck-host>:443):
  it resolves via the LAN DNS to local infra, is reached over the LAN (no tunnel),
  and presents a valid cert → the handshake completes and verifies → gluetun is
  healthy, no flapping, qBittorrent starts. DNS stays on the local resolver
  (<lan-dns>). Replace the host with any internal-only host that has a valid cert.
  No image changes.


  v1.6.4: Fix gluetun VPN flapping caused by the v1.6.3 LAN-DNS change. With DNS
  pointed at the LAN, gluetun's default startup healthcheck (a TLS handshake to
  cloudflare.com:443/github.com:443 through the tunnel) failed in the window right
  after WireGuard connects and — because HEALTH_RESTART_VPN is on by default —
  restarted the VPN endlessly, dropping qBittorrent every cycle. Point the startup
  check at the LAN router (HEALTH_TARGET_ADDRESSES=<lan-dns>:443 — raw IP, always
  up, serves TLS) so it passes instantly and the tunnel can settle; the ongoing
  small-check still pings 1.1.1.1/8.8.8.8 THROUGH the tunnel, so a genuinely dead
  VPN is still detected. DNS stays on the local resolver (<lan-dns>). No image
  changes.


  v1.6.3: Actually use the local LAN DNS resolver. v1.6.2 set
  DNS_UPSTREAM_PLAIN_ADDRESSES but gluetun v3.41.1 ignores it and keeps using
  Cloudflare (upstream bug qdm12/gluetun#3231), so DNS never reached the local
  resolver. Work around it by keeping the container's own nameserver: set the
  gluetun service `dns: <lan-dns>` and DNS_KEEP_NAMESERVER=on so gluetun does not
  replace resolv.conf with its (buggy) internal forwarder. qBittorrent now
  resolves through the LAN DNS (OpenWRT/AdGuard); torrent traffic still tunnels.


  v1.6.2: Stabilize DNS + auto-recover after VPN reconnects. VPN's BR
  servers were resetting gluetun's DNS-over-TLS to Cloudflare (:853), causing
  intermittent tracker-resolution failures, VPN healthcheck bounces, and
  stalled downloads. gluetun now uses PLAINTEXT DNS to the local LAN resolver
  (DNS_UPSTREAM_RESOLVER_TYPE=plain, DNS_UPSTREAM_PLAIN_ADDRESSES=<lan-dns>:53 —
  change to your own resolver), and the LAN subnet (<lan-subnet>) was added to
  FIREWALL_OUTBOUND_SUBNETS so gluetun can reach it (torrent traffic still goes
  through the VPN). Also: the qbit-port-sync sidecar now re-announces all
  torrents whenever VPN's forwarded port changes (i.e. after a VPN
  reconnect/new exit IP), so downloads/seeds recover automatically instead of
  stalling until qBit's next scheduled announce. No image changes.


  v1.6.1: Fix VPN port forwarding. v1.6.0 set gluetun
  FIREWALL_OUTBOUND_SUBNETS to broad private ranges (incl. 10.0.0.0/8), which
  overlapped VPN's tunnel gateway (10.2.0.x) and made the NAT-PMP
  forwarded-port request route off-tunnel and time out — so torrents were not
  connectable. Scoped it to Umbrel's Docker network (10.21.0.0/16) only, so
  NAT-PMP reaches the VPN gateway and port forwarding works. No image changes.


  v1.6.0: qBittorrent now routes ALL traffic through VPN via a new
  internal gluetun gateway (24/7, WireGuard) with a kill-switch — if the tunnel
  drops, qBit loses internet instead of leaking the real IP. Uses VPN port
  forwarding on P2P servers (PORT_FORWARD_ONLY) so torrents stay connectable;
  the dynamic forwarded port is auto-synced into qBittorrent by a small
  qbit-port-sync sidecar. qBittorrent's WebUI is still on host port 8082 (now
  published by gluetun); Sonarr/Radarr/cross-seed reach it at gluetun:8082.
  Requires a VPN PAID plan: post-install, drop your WireGuard PrivateKey
  and Address into config/gluetun/ (kept out of this repo) and enable
  qBittorrent "Bypass authentication for clients on localhost" (see README).
  Also bumps qBittorrent to 5.2.2 (libtorrent v2.0.13).


  v1.5.1: Run Unpackerr as user 1000:1000 at the Docker level instead of via
  PUID/PGID. The golift image is a plain Go binary (not an LSIO image) and
  ignores PUID/PGID, so it ran as root and wrote root-owned extracted files
  that Sonarr/Radarr (uid 1000) could not hardlink (fs.protected_hardlinks=1),
  which would break the import. Pinning the runtime user fixes file ownership
  so extracted releases hardlink into the library correctly.


  v1.5.0: Added Unpackerr (golift/unpackerr) to auto-extract RAR/scene
  releases. Sonarr/Radarr sometimes grab scene BluRay packs (e.g.
  iNVANDRAREN) that arrive as multi-part .rNN archives; without an extractor
  they finish downloading 100% but fail to import ("Found archive file").
  Unpackerr watches the Sonarr/Radarr queues, extracts archives in place and
  lets the *arr import via hardlink while the original archive keeps seeding.
  It runs internally (no UI/port). Post-install: fill
  config/unpackerr/unpackerr.conf with the Sonarr/Radarr URLs and API keys
  (see README), then restart the app.


  v1.4.0: Jellyfin migrated from the linuxserver.io image to the official
  jellyfin/jellyfin:10.11.11 (same version — pure vendor swap, no DB schema
  migration). The official image ships the Intel OpenCL runtime
  (intel-opencl-icd) that the LSIO image lacks, required for HDR->SDR tone
  mapping (tonemap_opencl). Symptom on LSIO: 4K HDR titles failed to play on any
  client that needs transcoding (SDR browsers, phones) with "FFmpeg exited with
  code 237 / Failed to get number of OpenCL platforms"; DirectPlay-capable
  clients were unaffected. The image now runs as user 1000:1000 (no PUID/PGID),
  and JELLYFIN_CONFIG_DIR/DATA_DIR/CACHE_DIR/LOG_DIR point it at the existing
  on-disk layout, so all users, libraries, watch history and settings are
  preserved in place (no data move).


  v1.3.1: Hotfix — the v1.3.0 Jellyfin pin (10.11.11-ls36) existed only on
  Docker Hub, not on lscr.io/GHCR where this app actually pulls from, so the
  image pull failed and the Umbrel update stalled with all services down.
  Jellyfin is now pinned by its lscr.io :latest digest (= 10.11.11); every
  other pin was verified to exist on the registry.


  v1.3.0: Pinned every image to an explicit, immutable version instead of
  the floating ":latest"/":6" tags — deterministic, reproducible deploys
  where the version listed here is exactly what runs, and updates are
  deliberate. Pins (checked 2026-06-10): Jellyfin 10.11.11-ls36, Sonarr
  4.0.17.2952-ls313, Radarr 6.2.1.10461-ls305, Bazarr v1.5.6-ls350,
  Prowlarr 2.4.0.5397-ls149, qBittorrent 5.2.1_v2.0.13-ls460, cross-seed
  6.13.7, Seerr v3.3.0 (unchanged). Byparr publishes no semver tags, so it
  is pinned by image digest — bump the digest to update it. The notable
  upgrades this release are Radarr and Prowlarr (both 2026-06-10 builds).


  v1.2.0: Replaced FlareSolverr with Byparr (ghcr.io/thephaseless/byparr),
  a drop-in replacement with a stronger anti-bot engine (nodriver/Camoufox)
  that solves the Cloudflare "managed challenge" loops FlareSolverr fails on
  (e.g. 1337x). Same FlareSolverr :8191 API — after updating, set the
  Prowlarr Indexer Proxy (type FlareSolverr) Host to http://byparr:8191.


  v1.1.0: Jellyseerr upgraded to Seerr v3.3.0 (the renamed successor —
  fallenbagel/jellyseerr image froze at 2.7.3). Database is migrated
  automatically on first start; v3 also fixes the *arr tag format
  incompatibility with Radarr 6.x. Image now pinned (seerr/seerr:v3.3.0).


  v1.0.0: Initial release.


  - 9 services in a single app: Jellyfin, Jellyseerr, Sonarr, Radarr,
    Bazarr, Prowlarr, qBittorrent, FlareSolverr, cross-seed.

  - Single /data volume with hardlink imports (zero copy, continuous
    seeding).

  - Quick Sync (Intel N150) enabled in Jellyfin via /dev/dri
    (group_add 991).

  - qBittorrent web UI on host port 8082 (8080 already in use on the
    Umbrel host).

  - Hardening: no-new-privileges on every service; cross-seed runs as
    non-root user 1000; FlareSolverr and cross-seed expose no host ports.
