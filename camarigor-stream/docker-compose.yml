services:
  init:
    image: busybox:stable
    user: "0"
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p \
          /app-data/config/jellyfin \
          /app-data/config/jellyseerr \
          /app-data/config/sonarr \
          /app-data/config/radarr \
          /app-data/config/bazarr \
          /app-data/config/prowlarr \
          /app-data/config/qbittorrent \
          /app-data/config/cross-seed \
          /app-data/config/unpackerr \
          /app-data/config/gluetun \
          /app-data/config/threadfin \
          /app-data/data/torrents/movies \
          /app-data/data/torrents/tv \
          /app-data/data/torrents/cross-seed \
          /app-data/data/media/movies \
          /app-data/data/media/tv
        chown 1000:1000 \
          /app-data/config \
          /app-data/config/jellyfin \
          /app-data/config/jellyseerr \
          /app-data/config/sonarr \
          /app-data/config/radarr \
          /app-data/config/bazarr \
          /app-data/config/prowlarr \
          /app-data/config/qbittorrent \
          /app-data/config/cross-seed \
          /app-data/config/unpackerr \
          /app-data/config/gluetun \
          /app-data/config/threadfin \
          /app-data/data \
          /app-data/data/torrents \
          /app-data/data/torrents/movies \
          /app-data/data/torrents/tv \
          /app-data/data/torrents/cross-seed \
          /app-data/data/media \
          /app-data/data/media/movies \
          /app-data/data/media/tv
    volumes:
      # /app-data exposes the whole app-data tree (so the config dirs get created).
      # The data dir is ALSO mounted explicitly so this init still works when
      # ${APP_DATA_DIR}/data is a SYMLINK to external storage: Docker resolves the
      # symlink for THIS mount, so /app-data/data is the real data dir inside the
      # container. Without it, init cannot create /app-data/data/* through a symlink
      # that points outside the container (mkdir fails "No such file or directory").
      # Harmless (same dir) when data is a normal directory/bind mount.
      - ${APP_DATA_DIR}:/app-data
      - ${APP_DATA_DIR}/data:/app-data/data

  jellyfin:
    # Official Jellyfin image (migrated from linuxserver.io 2026-06-11): it ships
    # the Intel OpenCL runtime (intel-opencl-icd), which the LSIO image lacks —
    # required for HDR->SDR tone mapping (tonemap_opencl), which fails on LSIO with
    # "FFmpeg exited with code 237 / Failed to get number of OpenCL platforms".
    # Same version (10.11.11) as the prior LSIO digest: pure vendor swap, no DB
    # schema migration.
    # Stays on the bridge (NOT behind the VPN): it serves local streaming + uses the
    # iGPU, and the LAN must reach it directly. It pulls Live TV from Threadfin (now
    # in the VPN netns) at http://gluetun:34400.
    image: jellyfin/jellyfin:10.11.11
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    # Official image runs the server directly as this user (no PUID/PGID/s6 layer).
    user: "1000:1000"
    environment:
      TZ: America/Sao_Paulo
      # Point the official image at the EXISTING LSIO on-disk layout so users,
      # libraries, watch history and config are read in place — no file moves.
      # LSIO kept config XMLs at /config (root) and data under /config/data;
      # the official image defaults differ (data at /config, config at
      # /config/config), so these overrides preserve the existing structure.
      JELLYFIN_CONFIG_DIR: /config
      JELLYFIN_DATA_DIR: /config/data
      JELLYFIN_CACHE_DIR: /config/cache
      JELLYFIN_LOG_DIR: /config/log
    # Intel N150 iGPU: Quick Sync via VAAPI/QSV + OpenCL tone mapping. GID 991 =
    # host `render` group (verified on the target host, 2026-06-05).
    group_add:
      - "991"
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "8096:8096"
    volumes:
      - ${APP_DATA_DIR}/config/jellyfin:/config
      - ${APP_DATA_DIR}/data/media:/media:ro

  jellyseerr:
    # Seerr is the renamed successor of Jellyseerr (fallenbagel/jellyseerr
    # froze at 2.7.3); pinned tag — bump deliberately via store updates.
    image: seerr/seerr:v3.3.0
    restart: on-failure
    # Run as non-root: the image defaults to root and litters the bind
    # mount with root-owned files (found during local testing 2026-06-05).
    user: "1000:1000"
    # Routed through the VPN: shares gluetun's network namespace, so it has NO own
    # ports/hostname. WebUI 5055 is published by gluetun; reach it at <host>:5055
    # from the LAN/reverse-proxy and at localhost:5055 from the other in-netns
    # services. Seerr -> Sonarr/Radarr use localhost; Seerr -> Jellyfin uses the host
    # LAN IP (Jellyfin stays on the bridge, unreachable by container name from here).
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo
      PORT: "5055"
    volumes:
      - ${APP_DATA_DIR}/config/jellyseerr:/app/config

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.18.2971-ls315
    restart: on-failure
    # Routed through the VPN: shares gluetun's netns (no own ports/hostname). WebUI
    # 8989 is published by gluetun; reach it at <host>:8989 from the LAN/reverse-proxy
    # and at localhost:8989 from the other in-netns services. Its download client
    # (qBittorrent) and Prowlarr are now at localhost; unpackerr (on the bridge)
    # reaches Sonarr at http://gluetun:8989.
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    volumes:
      - ${APP_DATA_DIR}/config/sonarr:/config
      - ${APP_DATA_DIR}/data:/data

  radarr:
    image: lscr.io/linuxserver/radarr:6.2.1.10461-ls305
    restart: on-failure
    # Routed through the VPN: shares gluetun's netns (no own ports/hostname). WebUI
    # 7878 is published by gluetun; reach it at <host>:7878 from the LAN/reverse-proxy
    # and at localhost:7878 from the other in-netns services. unpackerr (on the
    # bridge) reaches Radarr at http://gluetun:7878.
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    volumes:
      - ${APP_DATA_DIR}/config/radarr:/config
      - ${APP_DATA_DIR}/data:/data

  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls350
    restart: on-failure
    # Routed through the VPN: shares gluetun's netns (no own ports/hostname). WebUI
    # 6767 is published by gluetun; reach it at <host>:6767 from the LAN/reverse-proxy
    # and at localhost:6767 from the other in-netns services. Bazarr -> Sonarr/Radarr
    # use 127.0.0.1.
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    volumes:
      - ${APP_DATA_DIR}/config/bazarr:/config
      - ${APP_DATA_DIR}/data:/data

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0.5397-ls149
    restart: on-failure
    # Routed through the VPN: shares gluetun's netns (no own ports/hostname). WebUI
    # 9696 is published by gluetun; reach it at <host>:9696 from the LAN/reverse-proxy
    # and at localhost:9696 from the other in-netns services. Prowlarr -> Sonarr/
    # Radarr and Prowlarr -> byparr (FlareSolverr proxy) use localhost.
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    volumes:
      - ${APP_DATA_DIR}/config/prowlarr:/config

  threadfin:
    # Threadfin: M3U proxy/filter (xTeVe fork) that sits in front of Jellyfin's Live
    # TV. A raw IPTV/Xtream provider playlist can be hundreds of thousands of entries
    # (live channels + the entire VOD catalog), which Jellyfin's Live TV cannot
    # handle (channel resolution breaks -> "Unable to find host to play channel").
    # Point Threadfin at the provider M3U/Xtream URL, pick ONLY the channels you want
    # in its web UI (port 34400), and it serves a small, clean M3U + XMLTV to Jellyfin.
    # Routed through the VPN (shares gluetun's netns) — all acquisition-side traffic
    # egresses via the tunnel. WebUI 34400 is published by gluetun; Jellyfin (on the
    # bridge) pulls its M3U/EPG at http://gluetun:34400. Pinned by digest
    # (= v1.2.37, multi-arch).
    image: fyb3roptik/threadfin@sha256:96122ab220e14b881cbd40d7f8c7b022e1f9c6ecfe05aca2ab801e0321dc0d61
    restart: on-failure
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
    volumes:
      - ${APP_DATA_DIR}/config/threadfin:/home/threadfin/conf

  gluetun:
    # VPN gateway for the ENTIRE acquisition stack (24/7). qBittorrent, Sonarr,
    # Radarr, Prowlarr, Jellyseerr, Bazarr, byparr, cross-seed and Threadfin all
    # share this container's network namespace, so EVERY one of them egresses through
    # this WireGuard tunnel. gluetun's built-in kill-switch blocks every non-VPN
    # packet, so if the tunnel drops they lose internet instead of leaking the real
    # IP. Port forwarding is STATIC (a port reserved in the VPN provider's panel, set
    # via VPN_FORWARDED_PORT in exports.sh) — gluetun's dynamic NAT-PMP
    # (VPN_PORT_FORWARDING) is OFF; the reserved port is opened on the tunnel via
    # FIREWALL_VPN_INPUT_PORTS and qBittorrent's listen port is pinned to that same
    # fixed value in its own config (so peers can connect — seeding/ratio/H&R).
    # Pinned to the latest main build by DIGEST (2026-06-24). There is no stable
    # semver newer than v3.41.1, and v3.41.1 shipped a STALE embedded server list
    # (Feb 2026 — outdated server IPs caused a silent dead tunnel). This build has
    # a fresher server list AND the refactored DNS engine that finally
    # honours a custom plaintext upstream (the #3231 fix — see DNS settings below),
    # which is why DNS_KEEP_NAMESERVER is gone (it became obsolete in this build).
    # Digest-pinned for reproducibility (like byparr); bump deliberately — get the
    # new digest from Docker Hub's qmcgaw/gluetun:latest.
    image: qmcgaw/gluetun@sha256:d180743987bb24da1d749a1d7f3a78026e64ba2d09d2e08cc34b0acee7f7321b
    restart: on-failure
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    # Seed this netns's resolv.conf with your DNS resolver so gluetun records it as
    # the private resolver at container start; its built-in DNS then forwards to it
    # explicitly via DNS_UPSTREAM_* below. Every in-netns service shares this resolv,
    # so they all resolve via it too. Set LAN_DNS in exports.sh (see README);
    # defaults to 1.1.1.1 (Cloudflare) when unset.
    dns:
      - "${LAN_DNS:-1.1.1.1}"
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      TZ: America/Sao_Paulo
      VPN_SERVICE_PROVIDER: "${VPN_PROVIDER}"
      VPN_TYPE: wireguard
      # Secrets live in app-data (config/gluetun/), NEVER in this public repo.
      # Generate your VPN provider's WireGuard config, then write its
      # PrivateKey to config/gluetun/wireguard_private_key, its Address (e.g.
      # 10.x.x.x/32) to config/gluetun/wireguard_addresses, and its PresharedKey to
      # config/gluetun/wireguard_preshared_key (if your provider uses a PSK; see README).
      WIREGUARD_PRIVATE_KEY_SECRETFILE: /gluetun/wireguard_private_key
      WIREGUARD_ADDRESSES_SECRETFILE: /gluetun/wireguard_addresses
      WIREGUARD_PRESHARED_KEY_SECRETFILE: /gluetun/wireguard_preshared_key
      # FIXED WireGuard MTU. Without this, gluetun runs Path-MTU discovery (PMTUD),
      # which is buggy (gluetun#3108 / #3142): when PMTUD fails (ICMP blocked on the
      # path) gluetun reverts tun0 to a fallback MTU and large packets get black-holed
      # -> torrent throughput collapses while the healthcheck (small packets) still
      # passes, so gluetun never auto-recovers. Pinning a safe MTU bypasses discovery.
      # 1320 is a safe WireGuard MTU (matches the value most providers' .conf use).
      # If a server collapses even at this MTU it is a dead server -> switch servers
      # (change SERVER_COUNTRIES), don't lower further.
      WIREGUARD_MTU: "1320"
      # VPN WireGuard entry port (set via VPN_ENDPOINT_PORT in exports.sh). Prefer a
      # non-standard port over the well-known 51820 - ISPs that DPI/throttle VPNs
      # target the standard WireGuard port first.
      WIREGUARD_ENDPOINT_PORT: "${VPN_ENDPOINT_PORT:-}"
      # Port forwarding here is STATIC (a port you reserve in the VPN provider's
      # panel), NOT NAT-PMP -> gluetun's dynamic PF is OFF. The reserved port is
      # opened on the tunnel by FIREWALL_VPN_INPUT_PORTS below; qBittorrent's listen
      # port is fixed to that same value in its own config (app-data), so it stays
      # connectable. With a static port there is nothing dynamic to sync, so the old
      # qbit-port-sync sidecar has been removed.
      VPN_PORT_FORWARDING: "off"
      PORT_FORWARD_ONLY: "off"
      # VPN server selection — ALL configurable via exports.sh (empty = no filter,
      # gluetun auto-picks). PF is account-level (works on ANY server), so pick a
      # LIGHTLY-LOADED one (check your provider's server-load page): a saturated
      # server throttles download throughput even on a healthy tunnel, and latency
      # is irrelevant for bulk torrent download + a buffered TV stream. Pin ONE
      # server with VPN_SERVER_NAMES (the provider's server name); VPN_SERVER_CITIES
      # / VPN_SERVER_COUNTRIES filter broader. They AND together — when you pin a
      # name, leave the others empty.
      SERVER_COUNTRIES: "${VPN_SERVER_COUNTRIES:-}"
      SERVER_CITIES: "${VPN_SERVER_CITIES:-}"
      SERVER_NAMES: "${VPN_SERVER_NAMES:-}"
      # DNS: gluetun's built-in resolver forwards EVERY query to your resolver
      # (LAN_DNS) over plaintext UDP — the supported way to use a custom resolver on
      # this build (replaces the obsolete DNS_KEEP_NAMESERVER; the proper fix for
      # gluetun#3231, where older builds ignored a custom plaintext upstream and
      # forced Cloudflare). The query exits via the LAN (the resolver's subnet must
      # be in FIREWALL_OUTBOUND_SUBNETS); torrent traffic still tunnels. Every
      # in-netns service shares this DNS. Set LAN_DNS in exports.sh; defaults to
      # 1.1.1.1 when unset.
      DNS_UPSTREAM_RESOLVER_TYPE: plain
      DNS_UPSTREAM_PLAIN_ADDRESSES: "${LAN_DNS:-1.1.1.1}:53"
      # gluetun's built-in resolver has DNS-rebinding protection that REFUSES any
      # answer pointing to a PRIVATE IP. If your healthcheck host (below) is split-
      # horizon and resolves to a LAN IP, gluetun REFUSES it and loops on the startup
      # check forever — so exempt it here to allow the private-IP answer. Set
      # VPN_HEALTHCHECK_HOST in exports.sh; empty by default (no exemption needed
      # with the default public healthcheck target).
      DNS_REBINDING_PROTECTION_EXEMPT_HOSTNAMES: "${VPN_HEALTHCHECK_HOST:-}"
      # STARTUP healthcheck = a TLS handshake (WITH cert verification) to this
      # target. The default (cloudflare.com:443, through the tunnel) works for most
      # setups. If you route DNS to a LAN resolver, the through-tunnel default can
      # flap in the startup window — point it instead at an INTERNAL-only host that
      # presents a publicly-valid cert and is reached over the LAN (no tunnel
      # dependency), via VPN_HEALTHCHECK_HOST in exports.sh (also add that host to
      # the rebinding exemption above). NOT a raw IP (cert verification needs a SAN
      # match). The ongoing ICMP small-check still runs THROUGH the tunnel.
      HEALTH_TARGET_ADDRESSES: "${VPN_HEALTHCHECK_HOST:-cloudflare.com}:443"
      # Ongoing small-check pings 1.1.1.1/8.8.8.8 THROUGH the tunnel — this is what
      # DETECTS a dead tunnel (silent WireGuard failure) so gluetun reconnects to a
      # working server. ⚠️ Do NOT point this at the LAN (tried in v1.6.6,
      # 2026-06-21): a LAN target always answers, so gluetun reports "healthy" while
      # the tunnel is actually DEAD → the stack gets zero traffic and never auto-
      # recovers (this exact silent failure happened). The occasional transient
      # restart is the PRICE of auto-recovery; it self-heals. ⚠️ NOTE: every service
      # in this netns loses network during that restart window (not just qBit) — the
      # cost of routing the whole acquisition stack through one tunnel.
      HEALTH_ICMP_TARGET_IPS: 1.1.1.1,8.8.8.8
      # Publish the WebUIs of every service that shares this netns (qBittorrent + the
      # whole *arr stack) to the LAN/reverse-proxy. Each WebUI stays reachable at
      # <host>:<port> EXACTLY as before the service moved behind the VPN, so the
      # reverse proxy keeps pointing at host:port — no change needed there. byparr
      # (8191) and cross-seed (2468) are intentionally NOT here: they are reached only
      # over loopback (localhost) by the other in-netns services.
      FIREWALL_INPUT_PORTS: "8082,5055,8989,7878,6767,9696,34400"
      # Open the VPN's STATIC reserved forwarded port inbound on the TUNNEL so peers
      # can connect to qBittorrent (seeding/ratio/H&R). THIS is what makes the
      # reserved port work in the static model (providers with dynamic NAT-PMP
      # auto-manage this; a static reserved port must be opened explicitly). Set the
      # port you reserved in the VPN provider's panel via VPN_FORWARDED_PORT in
      # exports.sh; empty = no inbound port opened.
      FIREWALL_VPN_INPUT_PORTS: "${VPN_FORWARDED_PORT:-}"
      # Outbound subnets gluetun may reach OFF-tunnel: the Umbrel Docker net
      # (10.21.0.0/16) so the bridge containers (Jellyfin/unpackerr) reach the
      # in-netns WebUIs and Seerr reaches Jellyfin via the host, plus your LAN DNS.
      # If you use a LAN DNS resolver, add your LAN subnet too via VPN_OUTBOUND_SUBNETS
      # in exports.sh, e.g. "10.21.0.0/16,192.168.1.0/24". Do NOT add broad ranges
      # like 10.0.0.0/8: they can overlap the VPN's tunnel gateway (the 10.x WireGuard
      # address) and route tunnel traffic off-tunnel.
      FIREWALL_OUTBOUND_SUBNETS: "${VPN_OUTBOUND_SUBNETS:-10.21.0.0/16}"
    ports:
      # WebUIs of every service sharing this netns (qBittorrent + the *arr stack),
      # published so the LAN/reverse-proxy reach them at <host>:<port>. The
      # BitTorrent port is NOT published — incoming peers arrive via the VPN's
      # forwarded port through the tunnel.
      - "8082:8082"    # qBittorrent
      - "5055:5055"    # Jellyseerr
      - "8989:8989"    # Sonarr
      - "7878:7878"    # Radarr
      - "6767:6767"    # Bazarr
      - "9696:9696"    # Prowlarr
      - "34400:34400"  # Threadfin
    volumes:
      - ${APP_DATA_DIR}/config/gluetun:/gluetun
    # No no-new-privileges here: gluetun configures tun routing/iptables and
    # needs the NET_ADMIN capability to apply them.

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.2_v2.0.13-ls462
    restart: on-failure
    stop_grace_period: 30s
    # Routed through the VPN: shares gluetun's network namespace, so it has NO own
    # ports/hostname. WebUI 8082 is published by gluetun (above); reach it at
    # <host>:8082 from the LAN/reverse-proxy, and at localhost:8082 from the other
    # in-netns services (Sonarr/Radarr/cross-seed).
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
      # qBittorrent's Host-header validation rejects requests whose Host port
      # differs from the WebUI port, so keep 8082 (host port 8080 is taken on the
      # target host) — verified 2026-06-05.
      WEBUI_PORT: "8082"
      # The BitTorrent listen port is FIXED to the VPN's static reserved port
      # (VPN_FORWARDED_PORT) in qBittorrent.conf (app-data) — see README. With a
      # static forwarded port there is nothing dynamic to sync (no sidecar).
    volumes:
      - ${APP_DATA_DIR}/config/qbittorrent:/config
      - ${APP_DATA_DIR}/data:/data

  byparr:
    # FlareSolverr drop-in (nodriver/Camoufox engine) — solves the Cloudflare
    # "managed challenge" loops that FlareSolverr's undetected-chromedriver
    # fails on (e.g. 1337x). Same /v1 API on :8191; needs shm_size for the
    # headless browser. Verified to work under no-new-privileges (2026-06-07).
    # No semver tags upstream (only latest/main) — pinned by digest for
    # reproducibility; bump the digest deliberately to update it.
    # Routed through the VPN (shares gluetun's netns) — Prowlarr reaches it over
    # loopback at http://localhost:8191. NOTE: Cloudflare-protected indexers (1337x,
    # EZTV) ban the VPN's datacenter IPs (HTTP 403 / "error code: 1006"), so they do
    # NOT work from here. Running byparr on the bridge (home IP) was tried in v1.7.2
    # and reverted in v1.7.3: the home IP only helps if Prowlarr ALSO leaves the VPN
    # (the cf_clearance cookie is IP-bound), which wasn't worth taking the whole
    # indexer search off the VPN — 1337x was dropped instead.
    image: ghcr.io/thephaseless/byparr@sha256:01a46a2865d9a6db5eb8ead04ec0dd33b8fbe233e8565ae70b50d4cc0af4cfb0
    restart: on-failure
    shm_size: "2gb"
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo

  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:6.13.7
    restart: on-failure
    user: "1000:1000"
    # Routed through the VPN (shares gluetun's netns) — reaches qBittorrent and
    # Prowlarr over loopback (http://localhost:8082 / http://localhost:9696).
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo
    # First start: generates the /config/config.js template (gen-config)
    # which the user fills in post-install. The daemon restart-loops until
    # the config points to valid qBittorrent/Prowlarr endpoints (same
    # edit-and-restart pattern as camarigor-tdisplay-stack).
    entrypoint:
      - /bin/sh
      - -c
      - '[ -f /config/config.js ] || cross-seed gen-config; exec cross-seed daemon'
    volumes:
      - ${APP_DATA_DIR}/config/cross-seed:/config
      - ${APP_DATA_DIR}/data:/data
    # No ports: internal webhook only (qBittorrent -> http://localhost:2468).

  unpackerr:
    # Auto-extracts RAR/scene releases that Sonarr/Radarr grab. Scene BluRay
    # packs (e.g. iNVANDRAREN) arrive as multi-part .r00-.rNN archives; without
    # an extractor the download finishes 100% but the *arr apps cannot import
    # it (they log "Found archive file" and stall). Unpackerr polls the
    # Sonarr/Radarr queues, extracts archives in place, and the *arr then
    # imports the .mkv via hardlink while the original archive keeps seeding.
    # Official golift image; pinned — bump deliberately via store updates.
    # Stays on the bridge (NOT behind the VPN — it only touches local files +
    # the *arr APIs). It reaches Sonarr/Radarr (now in the VPN netns) at
    # http://gluetun:8989 / http://gluetun:7878 (set post-install in unpackerr.conf).
    image: golift/unpackerr:0.15.2
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    # golift/unpackerr is a plain Go binary (not an LSIO image) and ignores
    # PUID/PGID — it would run as root and create root-owned extracted files
    # that Sonarr/Radarr (uid 1000) cannot hardlink (fs.protected_hardlinks=1
    # on the host), breaking the import. Pin the runtime user at the Docker
    # level so extracted files are owned by 1000 and hardlink cleanly.
    user: "1000:1000"
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - ${APP_DATA_DIR}/config/unpackerr:/config
      - ${APP_DATA_DIR}/data:/data
    # No ports: internal only. First start writes a template
    # /config/unpackerr.conf which the user fills with the Sonarr/Radarr URLs
    # and API keys post-install (see README), then restarts the app.
