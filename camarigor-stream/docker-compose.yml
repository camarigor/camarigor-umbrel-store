services:
  init:
    image: busybox:stable
    user: "0"
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p \
          /app-data/config/jellyfin \
          /app-data/config/jellyseerr \
          /app-data/config/sonarr \
          /app-data/config/radarr \
          /app-data/config/bazarr \
          /app-data/config/prowlarr \
          /app-data/config/qbittorrent \
          /app-data/config/cross-seed \
          /app-data/config/unpackerr \
          /app-data/data/torrents/movies \
          /app-data/data/torrents/tv \
          /app-data/data/torrents/cross-seed \
          /app-data/data/media/movies \
          /app-data/data/media/tv
        chown 1000:1000 \
          /app-data/config \
          /app-data/config/jellyfin \
          /app-data/config/jellyseerr \
          /app-data/config/sonarr \
          /app-data/config/radarr \
          /app-data/config/bazarr \
          /app-data/config/prowlarr \
          /app-data/config/qbittorrent \
          /app-data/config/cross-seed \
          /app-data/config/unpackerr \
          /app-data/data \
          /app-data/data/torrents \
          /app-data/data/torrents/movies \
          /app-data/data/torrents/tv \
          /app-data/data/torrents/cross-seed \
          /app-data/data/media \
          /app-data/data/media/movies \
          /app-data/data/media/tv
    volumes:
      - ${APP_DATA_DIR}:/app-data

  jellyfin:
    # Official Jellyfin image (migrated from linuxserver.io 2026-06-11): it ships
    # the Intel OpenCL runtime (intel-opencl-icd), which the LSIO image lacks —
    # required for HDR->SDR tone mapping (tonemap_opencl), which fails on LSIO with
    # "FFmpeg exited with code 237 / Failed to get number of OpenCL platforms".
    # Same version (10.11.11) as the prior LSIO digest: pure vendor swap, no DB
    # schema migration.
    image: jellyfin/jellyfin:10.11.11
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    # Official image runs the server directly as this user (no PUID/PGID/s6 layer).
    user: "1000:1000"
    environment:
      TZ: America/Sao_Paulo
      # Point the official image at the EXISTING LSIO on-disk layout so users,
      # libraries, watch history and config are read in place — no file moves.
      # LSIO kept config XMLs at /config (root) and data under /config/data;
      # the official image defaults differ (data at /config, config at
      # /config/config), so these overrides preserve the existing structure.
      JELLYFIN_CONFIG_DIR: /config
      JELLYFIN_DATA_DIR: /config/data
      JELLYFIN_CACHE_DIR: /config/cache
      JELLYFIN_LOG_DIR: /config/log
    # Intel N150 iGPU: Quick Sync via VAAPI/QSV + OpenCL tone mapping. GID 991 =
    # host `render` group (verified on the target host, 2026-06-05).
    group_add:
      - "991"
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "8096:8096"
    volumes:
      - ${APP_DATA_DIR}/config/jellyfin:/config
      - ${APP_DATA_DIR}/data/media:/media:ro

  jellyseerr:
    # Seerr is the renamed successor of Jellyseerr (fallenbagel/jellyseerr
    # froze at 2.7.3); pinned tag — bump deliberately via store updates.
    image: seerr/seerr:v3.3.0
    restart: on-failure
    # Run as non-root: the image defaults to root and litters the bind
    # mount with root-owned files (found during local testing 2026-06-05).
    user: "1000:1000"
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo
      PORT: "5055"
    ports:
      - "5055:5055"
    volumes:
      - ${APP_DATA_DIR}/config/jellyseerr:/app/config

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls313
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    ports:
      - "8989:8989"
    volumes:
      - ${APP_DATA_DIR}/config/sonarr:/config
      - ${APP_DATA_DIR}/data:/data

  radarr:
    image: lscr.io/linuxserver/radarr:6.2.1.10461-ls305
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    ports:
      - "7878:7878"
    volumes:
      - ${APP_DATA_DIR}/config/radarr:/config
      - ${APP_DATA_DIR}/data:/data

  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls350
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    ports:
      - "6767:6767"
    volumes:
      - ${APP_DATA_DIR}/config/bazarr:/config
      - ${APP_DATA_DIR}/data:/data

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0.5397-ls149
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    ports:
      - "9696:9696"
    volumes:
      - ${APP_DATA_DIR}/config/prowlarr:/config

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.1_v2.0.13-ls460
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
      # 8082 inside AND outside: host port 8080 is taken on the target
      # host, and qBittorrent's Host-header validation rejects requests
      # whose Host port differs from the WebUI port (verified empirically
      # 2026-06-05) — remapping 8082->8080 returns a bare 401.
      WEBUI_PORT: "8082"
      TORRENTING_PORT: "6881"
    ports:
      - "8082:8082"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ${APP_DATA_DIR}/config/qbittorrent:/config
      - ${APP_DATA_DIR}/data:/data

  byparr:
    # FlareSolverr drop-in (nodriver/Camoufox engine) — solves the Cloudflare
    # "managed challenge" loops that FlareSolverr's undetected-chromedriver
    # fails on (e.g. 1337x). Same /v1 API on :8191; needs shm_size for the
    # headless browser. Verified to work under no-new-privileges (2026-06-07).
    # No semver tags upstream (only latest/main) — pinned by digest for
    # reproducibility; bump the digest deliberately to update it.
    image: ghcr.io/thephaseless/byparr@sha256:01a46a2865d9a6db5eb8ead04ec0dd33b8fbe233e8565ae70b50d4cc0af4cfb0
    restart: on-failure
    shm_size: "2gb"
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo
    # No ports: only reached by Prowlarr over the internal network
    # (http://byparr:8191).

  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:6.13.7
    restart: on-failure
    user: "1000:1000"
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo
    # First start: generates the /config/config.js template (gen-config)
    # which the user fills in post-install. The daemon restart-loops until
    # the config points to valid qBittorrent/Prowlarr endpoints (same
    # edit-and-restart pattern as camarigor-tdisplay-stack).
    entrypoint:
      - /bin/sh
      - -c
      - '[ -f /config/config.js ] || cross-seed gen-config; exec cross-seed daemon'
    volumes:
      - ${APP_DATA_DIR}/config/cross-seed:/config
      - ${APP_DATA_DIR}/data:/data
    # No ports: internal webhook only (qbittorrent -> http://cross-seed:2468).

  unpackerr:
    # Auto-extracts RAR/scene releases that Sonarr/Radarr grab. Scene BluRay
    # packs (e.g. iNVANDRAREN) arrive as multi-part .r00-.rNN archives; without
    # an extractor the download finishes 100% but the *arr apps cannot import
    # it (they log "Found archive file" and stall). Unpackerr polls the
    # Sonarr/Radarr queues, extracts archives in place, and the *arr then
    # imports the .mkv via hardlink while the original archive keeps seeding.
    # Official golift image; pinned — bump deliberately via store updates.
    image: golift/unpackerr:0.15.2
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    # golift/unpackerr is a plain Go binary (not an LSIO image) and ignores
    # PUID/PGID — it would run as root and create root-owned extracted files
    # that Sonarr/Radarr (uid 1000) cannot hardlink (fs.protected_hardlinks=1
    # on the host), breaking the import. Pin the runtime user at the Docker
    # level so extracted files are owned by 1000 and hardlink cleanly.
    user: "1000:1000"
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - ${APP_DATA_DIR}/config/unpackerr:/config
      - ${APP_DATA_DIR}/data:/data
    # No ports: internal only. First start writes a template
    # /config/unpackerr.conf which the user fills with the Sonarr/Radarr URLs
    # and API keys post-install (see README), then restarts the app.
