services:
  init:
    image: busybox:stable
    user: "0"
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p \
          /app-data/config/jellyfin \
          /app-data/config/jellyseerr \
          /app-data/config/sonarr \
          /app-data/config/radarr \
          /app-data/config/bazarr \
          /app-data/config/prowlarr \
          /app-data/config/qbittorrent \
          /app-data/config/cross-seed \
          /app-data/config/unpackerr \
          /app-data/config/gluetun \
          /app-data/config/threadfin \
          /app-data/data/torrents/movies \
          /app-data/data/torrents/tv \
          /app-data/data/torrents/cross-seed \
          /app-data/data/media/movies \
          /app-data/data/media/tv
        chown 1000:1000 \
          /app-data/config \
          /app-data/config/jellyfin \
          /app-data/config/jellyseerr \
          /app-data/config/sonarr \
          /app-data/config/radarr \
          /app-data/config/bazarr \
          /app-data/config/prowlarr \
          /app-data/config/qbittorrent \
          /app-data/config/cross-seed \
          /app-data/config/unpackerr \
          /app-data/config/gluetun \
          /app-data/config/threadfin \
          /app-data/data \
          /app-data/data/torrents \
          /app-data/data/torrents/movies \
          /app-data/data/torrents/tv \
          /app-data/data/torrents/cross-seed \
          /app-data/data/media \
          /app-data/data/media/movies \
          /app-data/data/media/tv
    volumes:
      # /app-data exposes the whole app-data tree (so the config dirs get created).
      # The data dir is ALSO mounted explicitly so this init still works when
      # ${APP_DATA_DIR}/data is a SYMLINK to external storage: Docker resolves the
      # symlink for THIS mount, so /app-data/data is the real data dir inside the
      # container. Without it, init cannot create /app-data/data/* through a symlink
      # that points outside the container (mkdir fails "No such file or directory").
      # Harmless (same dir) when data is a normal directory/bind mount.
      - ${APP_DATA_DIR}:/app-data
      - ${APP_DATA_DIR}/data:/app-data/data

  jellyfin:
    # Official Jellyfin image (migrated from linuxserver.io 2026-06-11): it ships
    # the Intel OpenCL runtime (intel-opencl-icd), which the LSIO image lacks —
    # required for HDR->SDR tone mapping (tonemap_opencl), which fails on LSIO with
    # "FFmpeg exited with code 237 / Failed to get number of OpenCL platforms".
    # Same version (10.11.11) as the prior LSIO digest: pure vendor swap, no DB
    # schema migration.
    image: jellyfin/jellyfin:10.11.11
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    # Official image runs the server directly as this user (no PUID/PGID/s6 layer).
    user: "1000:1000"
    environment:
      TZ: America/Sao_Paulo
      # Point the official image at the EXISTING LSIO on-disk layout so users,
      # libraries, watch history and config are read in place — no file moves.
      # LSIO kept config XMLs at /config (root) and data under /config/data;
      # the official image defaults differ (data at /config, config at
      # /config/config), so these overrides preserve the existing structure.
      JELLYFIN_CONFIG_DIR: /config
      JELLYFIN_DATA_DIR: /config/data
      JELLYFIN_CACHE_DIR: /config/cache
      JELLYFIN_LOG_DIR: /config/log
    # Intel N150 iGPU: Quick Sync via VAAPI/QSV + OpenCL tone mapping. GID 991 =
    # host `render` group (verified on the target host, 2026-06-05).
    group_add:
      - "991"
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "8096:8096"
    volumes:
      - ${APP_DATA_DIR}/config/jellyfin:/config
      - ${APP_DATA_DIR}/data/media:/media:ro

  jellyseerr:
    # Seerr is the renamed successor of Jellyseerr (fallenbagel/jellyseerr
    # froze at 2.7.3); pinned tag — bump deliberately via store updates.
    image: seerr/seerr:v3.3.0
    restart: on-failure
    # Run as non-root: the image defaults to root and litters the bind
    # mount with root-owned files (found during local testing 2026-06-05).
    user: "1000:1000"
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo
      PORT: "5055"
    ports:
      - "5055:5055"
    volumes:
      - ${APP_DATA_DIR}/config/jellyseerr:/app/config

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls313
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    ports:
      - "8989:8989"
    volumes:
      - ${APP_DATA_DIR}/config/sonarr:/config
      - ${APP_DATA_DIR}/data:/data

  radarr:
    image: lscr.io/linuxserver/radarr:6.2.1.10461-ls305
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    ports:
      - "7878:7878"
    volumes:
      - ${APP_DATA_DIR}/config/radarr:/config
      - ${APP_DATA_DIR}/data:/data

  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls350
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    ports:
      - "6767:6767"
    volumes:
      - ${APP_DATA_DIR}/config/bazarr:/config
      - ${APP_DATA_DIR}/data:/data

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0.5397-ls149
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
    ports:
      - "9696:9696"
    volumes:
      - ${APP_DATA_DIR}/config/prowlarr:/config

  threadfin:
    # Threadfin: M3U proxy/filter (xTeVe fork) that sits in front of Jellyfin's Live
    # TV. A raw IPTV/Xtream provider playlist can be hundreds of thousands of entries
    # (live channels + the entire VOD catalog), which Jellyfin's Live TV cannot
    # handle (channel resolution breaks -> "Unable to find host to play channel").
    # Point Threadfin at the provider M3U/Xtream URL, pick ONLY the channels you want
    # in its web UI (port 34400), and it serves a small, clean M3U + XMLTV to Jellyfin.
    # Egresses DIRECTLY (NOT through the VPN) — it is not torrent traffic. Pinned by
    # digest (= v1.2.37, multi-arch).
    image: fyb3roptik/threadfin@sha256:96122ab220e14b881cbd40d7f8c7b022e1f9c6ecfe05aca2ab801e0321dc0d61
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
    ports:
      - "34400:34400"
    volumes:
      - ${APP_DATA_DIR}/config/threadfin:/home/threadfin/conf

  gluetun:
    # ProtonVPN gateway for qBittorrent (24/7). ALL qBittorrent traffic egresses
    # through this WireGuard tunnel; gluetun's built-in kill-switch blocks every
    # non-VPN packet, so if the tunnel drops qBit loses internet instead of
    # leaking the real IP. PORT_FORWARD_ONLY=on connects ONLY to P2P/
    # port-forwarding servers; VPN_PORT_FORWARDING=on requests a forwarded port
    # (NAT-PMP) so qBittorrent stays connectable (seeding/ratio/H&R). The dynamic
    # forwarded port is written to /gluetun/forwarded_port and pushed into
    # qBittorrent by the qbit-port-sync sidecar.
    # Pinned to the latest main build by DIGEST (2026-06-14). There is no stable
    # semver newer than v3.41.1, and v3.41.1 shipped a STALE embedded server list
    # (Feb 2026 — outdated Proton IPs caused a silent dead tunnel). This build has
    # a fresher ProtonVPN server list AND the refactored DNS engine that finally
    # honours a custom plaintext upstream (the #3231 fix — see DNS settings below),
    # which is why DNS_KEEP_NAMESERVER is gone (it became obsolete in this build).
    # Digest-pinned for reproducibility (like byparr); bump deliberately — get the
    # new digest from Docker Hub's qmcgaw/gluetun:latest.
    image: qmcgaw/gluetun@sha256:0e999c910d8077458ffbd869acfd9faa2a49decbca02afec6370277854587b3e
    restart: on-failure
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    # Seed this netns's resolv.conf with your DNS resolver so gluetun records it as
    # the private resolver at container start; its built-in DNS then forwards to it
    # explicitly via DNS_UPSTREAM_* below. qBit and the sidecar share this netns, so
    # they resolve via it too. Set LAN_DNS in exports.sh (see README); defaults to
    # 1.1.1.1 (Cloudflare) when unset.
    dns:
      - "${LAN_DNS:-1.1.1.1}"
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      TZ: America/Sao_Paulo
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      # Secrets live in app-data (config/gluetun/), NEVER in this public repo.
      # Generate a ProtonVPN WireGuard config with NAT-PMP enabled, then write its
      # PrivateKey to config/gluetun/wireguard_private_key and its Address (e.g.
      # 10.2.0.2/32) to config/gluetun/wireguard_addresses (see README).
      WIREGUARD_PRIVATE_KEY_SECRETFILE: /gluetun/wireguard_private_key
      WIREGUARD_ADDRESSES_SECRETFILE: /gluetun/wireguard_addresses
      # FIXED WireGuard MTU. Without this, gluetun runs Path-MTU discovery (PMTUD),
      # which is buggy (gluetun#3108 / #3142): on some ProtonVPN servers PMTUD fails
      # (ICMP blocked on the path), gluetun reverts tun0 to a fallback MTU and large
      # packets get black-holed -> torrent throughput collapses to near zero, while
      # the healthcheck (small packets) still passes, so gluetun never auto-recovers
      # (you only notice via slow downloads). Pinning a safe MTU bypasses discovery.
      # 1400 is the value gluetun's PMTUD measured working THROUGH the tunnel on a
      # good server; a DF ping to the WireGuard endpoint measured this link's path
      # MTU at a clean 1500 (no PPPoE limit), so 1400 sits ~40 bytes below the 1440
      # ceiling a 1500 path allows -> proven AND with margin. Raise toward 1420 for a
      # bit more speed (untested through the tunnel); if a DIFFERENT server ever
      # collapses even at this MTU it is a dead server -> switch servers, don't lower.
      WIREGUARD_MTU: "1400"
      VPN_PORT_FORWARDING: "on"
      VPN_PORT_FORWARDING_STATUS_FILE: /gluetun/forwarded_port
      PORT_FORWARD_ONLY: "on"
      # ProtonVPN P2P + port-forwarding servers in Brazil. If Brazil has no
      # port-forwarding server, gluetun fails fast in its logs — change this to
      # another country (e.g. Netherlands) or remove it to auto-pick any PF server.
      SERVER_COUNTRIES: Brazil
      # DNS: gluetun's built-in resolver forwards EVERY query to your resolver
      # (LAN_DNS) over plaintext UDP — the supported way to use a custom resolver on
      # this build (replaces the obsolete DNS_KEEP_NAMESERVER; the proper fix for
      # gluetun#3231, where older builds ignored a custom plaintext upstream and
      # forced Cloudflare). The query exits via the LAN (the resolver's subnet must
      # be in FIREWALL_OUTBOUND_SUBNETS); torrent traffic still tunnels. qBit +
      # sidecar share this netns -> same DNS. Set LAN_DNS in exports.sh; defaults to
      # 1.1.1.1 when unset.
      DNS_UPSTREAM_RESOLVER_TYPE: plain
      DNS_UPSTREAM_PLAIN_ADDRESSES: "${LAN_DNS:-1.1.1.1}:53"
      # gluetun's built-in resolver has DNS-rebinding protection that REFUSES any
      # answer pointing to a PRIVATE IP. If your healthcheck host (below) is split-
      # horizon and resolves to a LAN IP, gluetun REFUSES it and loops on the startup
      # check forever — so exempt it here to allow the private-IP answer. Set
      # VPN_HEALTHCHECK_HOST in exports.sh; empty by default (no exemption needed
      # with the default public healthcheck target).
      DNS_REBINDING_PROTECTION_EXEMPT_HOSTNAMES: "${VPN_HEALTHCHECK_HOST:-}"
      # STARTUP healthcheck = a TLS handshake (WITH cert verification) to this
      # target. The default (cloudflare.com:443, through the tunnel) works for most
      # setups. If you route DNS to a LAN resolver, the through-tunnel default can
      # flap in the startup window — point it instead at an INTERNAL-only host that
      # presents a publicly-valid cert and is reached over the LAN (no tunnel
      # dependency), via VPN_HEALTHCHECK_HOST in exports.sh (also add that host to
      # the rebinding exemption above). NOT a raw IP (cert verification needs a SAN
      # match). The ongoing ICMP small-check still runs THROUGH the tunnel.
      HEALTH_TARGET_ADDRESSES: "${VPN_HEALTHCHECK_HOST:-cloudflare.com}:443"
      # Ongoing small-check pings 1.1.1.1/8.8.8.8 THROUGH the tunnel — this is what
      # DETECTS a dead tunnel (silent WireGuard failure) so gluetun reconnects to a
      # working server. ⚠️ Do NOT point this at the LAN (tried in v1.6.6,
      # 2026-06-21): a LAN target always answers, so gluetun reports "healthy" while
      # the tunnel is actually DEAD → qBit gets zero traffic and never auto-recovers
      # (this exact silent failure happened). The occasional transient restart is
      # the PRICE of auto-recovery and the sidecar reannounces on reconnect, so it
      # self-heals. Only the startup check (HEALTH_TARGET_ADDRESSES above) is on the
      # internal valid-cert host, purely to avoid the startup-window flap.
      HEALTH_ICMP_TARGET_IPS: 1.1.1.1,8.8.8.8
      # Expose qBittorrent's WebUI (8082) through gluetun to the LAN.
      FIREWALL_INPUT_PORTS: "8082"
      # Let qBit (in this netns) reach the other stack containers (cross-seed
      # webhook), let Sonarr/Radarr reach qBit, AND let gluetun reach your LAN DNS.
      # Umbrel Docker net = 10.21.0.0/16 (the default below). If you use a LAN DNS
      # resolver, add your LAN subnet too via VPN_OUTBOUND_SUBNETS in exports.sh,
      # e.g. "10.21.0.0/16,192.168.1.0/24". Do NOT add broad ranges like 10.0.0.0/8:
      # they overlap ProtonVPN's tunnel gateway (10.2.0.x) and break NAT-PMP port
      # forwarding (the forwarded-port request gets routed off-tunnel).
      FIREWALL_OUTBOUND_SUBNETS: "${VPN_OUTBOUND_SUBNETS:-10.21.0.0/16}"
    ports:
      # qBittorrent WebUI (qBit runs in this network namespace). The BitTorrent
      # port is NOT published — incoming peers arrive via ProtonVPN's forwarded
      # port through the tunnel.
      - "8082:8082"
    volumes:
      - ${APP_DATA_DIR}/config/gluetun:/gluetun
    # No no-new-privileges here: gluetun configures tun routing/iptables and
    # needs the NET_ADMIN capability to apply them.

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.2_v2.0.13-ls462
    restart: on-failure
    stop_grace_period: 30s
    # Routed through ProtonVPN: shares gluetun's network namespace, so it has NO
    # own ports/hostname. WebUI 8082 is published by gluetun (above); reach it at
    # gluetun:8082 from Sonarr/Radarr/cross-seed, and at <host>:8082 from the LAN.
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      UMASK: "002"
      # qBittorrent's Host-header validation rejects requests whose Host port
      # differs from the WebUI port, so keep 8082 (host port 8080 is taken on the
      # target host) — verified 2026-06-05.
      WEBUI_PORT: "8082"
      # No fixed TORRENTING_PORT — the listen port is set dynamically to
      # ProtonVPN's forwarded port by the qbit-port-sync sidecar.
    volumes:
      - ${APP_DATA_DIR}/config/qbittorrent:/config
      - ${APP_DATA_DIR}/data:/data

  byparr:
    # FlareSolverr drop-in (nodriver/Camoufox engine) — solves the Cloudflare
    # "managed challenge" loops that FlareSolverr's undetected-chromedriver
    # fails on (e.g. 1337x). Same /v1 API on :8191; needs shm_size for the
    # headless browser. Verified to work under no-new-privileges (2026-06-07).
    # No semver tags upstream (only latest/main) — pinned by digest for
    # reproducibility; bump the digest deliberately to update it.
    image: ghcr.io/thephaseless/byparr@sha256:01a46a2865d9a6db5eb8ead04ec0dd33b8fbe233e8565ae70b50d4cc0af4cfb0
    restart: on-failure
    shm_size: "2gb"
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo
    # No ports: only reached by Prowlarr over the internal network
    # (http://byparr:8191).

  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:6.13.7
    restart: on-failure
    user: "1000:1000"
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo
    # First start: generates the /config/config.js template (gen-config)
    # which the user fills in post-install. The daemon restart-loops until
    # the config points to valid qBittorrent/Prowlarr endpoints (same
    # edit-and-restart pattern as camarigor-tdisplay-stack).
    entrypoint:
      - /bin/sh
      - -c
      - '[ -f /config/config.js ] || cross-seed gen-config; exec cross-seed daemon'
    volumes:
      - ${APP_DATA_DIR}/config/cross-seed:/config
      - ${APP_DATA_DIR}/data:/data
    # No ports: internal webhook only (qbittorrent -> http://cross-seed:2468).

  unpackerr:
    # Auto-extracts RAR/scene releases that Sonarr/Radarr grab. Scene BluRay
    # packs (e.g. iNVANDRAREN) arrive as multi-part .r00-.rNN archives; without
    # an extractor the download finishes 100% but the *arr apps cannot import
    # it (they log "Found archive file" and stall). Unpackerr polls the
    # Sonarr/Radarr queues, extracts archives in place, and the *arr then
    # imports the .mkv via hardlink while the original archive keeps seeding.
    # Official golift image; pinned — bump deliberately via store updates.
    image: golift/unpackerr:0.15.2
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    # golift/unpackerr is a plain Go binary (not an LSIO image) and ignores
    # PUID/PGID — it would run as root and create root-owned extracted files
    # that Sonarr/Radarr (uid 1000) cannot hardlink (fs.protected_hardlinks=1
    # on the host), breaking the import. Pin the runtime user at the Docker
    # level so extracted files are owned by 1000 and hardlink cleanly.
    user: "1000:1000"
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - ${APP_DATA_DIR}/config/unpackerr:/config
      - ${APP_DATA_DIR}/data:/data
    # No ports: internal only. First start writes a template
    # /config/unpackerr.conf which the user fills with the Sonarr/Radarr URLs
    # and API keys post-install (see README), then restarts the app.

  qbit-port-sync:
    # Keeps qBittorrent's listen port equal to ProtonVPN's dynamic forwarded port
    # (so qBit stays connectable -> seeding/ratio/H&R). Shares gluetun's netns,
    # reads the port gluetun writes to /gluetun/forwarded_port, and pushes it to
    # qBit at 127.0.0.1:8082. REQUIRES qBittorrent -> Options -> WebUI -> "Bypass
    # authentication for clients on localhost" = ON (set post-install; see README).
    image: curlimages/curl:8.11.1
    restart: on-failure
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
      qbittorrent:
        condition: service_started
    # root so it can read gluetun's port file regardless of ownership.
    user: "0:0"
    volumes:
      - ${APP_DATA_DIR}/config/gluetun:/gluetun:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        LAST=""
        while true; do
          P=$$(cat /gluetun/forwarded_port 2>/dev/null)
          if [ -n "$$P" ] && [ "$$P" != "$$LAST" ]; then
            if curl -fsS -H "Referer: http://127.0.0.1:8082" \
              --data-urlencode "json={\"listen_port\":$$P,\"random_port\":false,\"upnp\":false}" \
              http://127.0.0.1:8082/api/v2/app/setPreferences >/dev/null 2>&1; then
              LAST="$$P"; echo "[qbit-port-sync] listen_port=$$P"
              # Port changed => gluetun reconnected with a NEW exit IP. Re-announce
              # all torrents so trackers learn the new IP:port immediately, else
              # downloads/seeds stall until qBit's next scheduled announce.
              curl -fsS -H "Referer: http://127.0.0.1:8082" \
                --data-urlencode "hashes=all" \
                http://127.0.0.1:8082/api/v2/torrents/reannounce >/dev/null 2>&1 \
                && echo "[qbit-port-sync] reannounced all torrents"
            fi
          fi
          sleep 60
        done
