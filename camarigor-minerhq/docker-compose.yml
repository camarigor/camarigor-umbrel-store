version: "3.7"

services:
  server:
    image: ghcr.io/camarigor/miner-hq:1.0.0
    restart: on-failure
    stop_grace_period: 30s
    network_mode: host
    environment:
      TZ: America/Sao_Paulo
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - ${APP_DATA_DIR}/data:/data
