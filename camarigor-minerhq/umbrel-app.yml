id: camarigor-minerhq
category: bitcoin
name: MinerHQ
version: "1.0.0"
tagline: Real-time monitoring dashboard for NerdQAxe and AxeOS bitcoin miners
icon: https://raw.githubusercontent.com/camarigor/camarigor-umbrel-store/main/camarigor-minerhq/icon.png
description: >-
  MinerHQ is a real-time monitoring dashboard for NerdQAxe and AxeOS/Zyber ASIC
  bitcoin and altcoin miners.


  Features:

  - Real-time hashrate, temperature, and power consumption monitoring

  - Multi-coin support (BTC, BCH, DGB, XEC, BC2, BTCS)

  - Automatic price updates from Binance and CoinGecko

  - Discord alerts (11 types with emoji embeds)

  - Weekly competitions between miners (Best Share, Block Hunters, Money Makers)

  - Network auto-discovery for local miners

  - Block validation via Blockbook API

  - Earnings tracker with historical USD values
