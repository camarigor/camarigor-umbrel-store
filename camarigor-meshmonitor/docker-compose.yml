version: "3.7"

# NOTE: read_only:true is intentionally NOT set for this service.
# MeshMonitor's startup runs chown -R on /app/dist for its non-root user,
# which fails on a read-only filesystem. Compensating security controls
# are applied below: no-new-privileges, all capabilities dropped except
# the four required for the chown step, and data isolated in named volume.
services:
  camarigor-meshmonitor:
    image: ghcr.io/yeraze/meshmonitor:4.11.5
    restart: on-failure
    stop_grace_period: 30s
    ports:
      - "9003:3001"
    environment:
      TZ: America/Sao_Paulo
      # Accessed only through the internal reverse proxy (NPM) at this HTTPS
      # name. COOKIE_SECURE requires HTTPS, so the plain-HTTP Umbrel dashboard
      # "Open" button is intentionally not a supported login path here.
      ALLOWED_ORIGINS: "https://meshmonitor.tinfoilhat.work"
      COOKIE_SECURE: "true"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - ${APP_DATA_DIR}/data:/data
