manifestVersion: 1
id: camarigor-meshmonitor
category: networking
name: MeshMonitor
version: "4.10.1"
tagline: Self-hosted Meshtastic monitoring with real-time maps, messages, and alerts
icon: https://raw.githubusercontent.com/camarigor/camarigor-umbrel-store/main/camarigor-meshmonitor/icon.png
description: >-
  MeshMonitor is a self-hosted Meshtastic monitoring and management platform
  for multi-source LoRa mesh networks. Goes well beyond the standard Meshtastic
  Web client by providing centralized dashboard, real-time analytics, message
  history, automation, and remote administration.


  Features:

  - Real-time map view with all nodes, GPS positions, and traceroutes

  - Unified message history across multiple Meshtastic nodes (sources)

  - Per-source permission system with user roles

  - Telemetry visualization (battery, voltage, channel utilization, sensors)

  - Push, Apprise, and desktop notifications

  - Automated traceroutes, time-sync, and key repair

  - Channel and node database with full mesh awareness

  - SQLite-backed data persistence with automatic backups

  - Solar production estimates and weather integration

  - Security audit log and digest reports


  After installing, log in with the default credentials and change them
  immediately. Configure your Meshtastic node IP via Dashboard → Sources or
  via the `MESHTASTIC_NODE_IP` environment variable.


  IMPORTANT: Default login is admin / changeme. Change the admin password
  on first login.
developer: Yeraze
website: https://meshmonitor.org
support: https://github.com/Yeraze/meshmonitor/issues
dependencies: []
port: 9003
gallery: []
path: ""
defaultUsername: "admin"
defaultPassword: "changeme"
releaseNotes: >-
  v4.10.1: Image updated 4.9.4 → 4.10.1 (rolls in the upstream 4.10.0 + 4.10.1
  releases). The HTTPS reverse-proxy packaging from v4.9.5 (ALLOWED_ORIGINS +
  COOKIE_SECURE) is retained. Headlines: Automated Remote Favorites management
  for infrastructure nodes (via NeighborInfo discovery + traceroutes), a global
  toggle to disable link previews across all message surfaces, guided firmware
  half-flash recovery with online checks, and per-channel notification sounds.
  Fixes: MeshCore decodes packed out_path_len for correct hop counts, batteryMv
  persists after telemetry polls, and auto-favorite checkbox alignment.


  v4.10.0: Auto Remote LocalStats automation (polls remote nodes for noise floor
  and channel utilization), Map Analysis upgrades (node search, marker
  clustering/spiderfy, directional traceroute arrows, weak-link filtering),
  GeoJSON overlays rendering on anonymous and dashboard maps, and desktop builds
  bundling Apprise as a frozen sidecar. Fixes: cross-source Security-tab data
  leak, Radio Statistics legend clipping, and custom analytics CSP domains
  reaching HTTP headers.


  v4.9.5: Packaging-only change — image unchanged (still
  ghcr.io/yeraze/meshmonitor:4.9.4). Adapts MeshMonitor for access through an
  internal reverse proxy over HTTPS: ALLOWED_ORIGINS is set to the proxy
  hostname and COOKIE_SECURE is enabled, so cookie-based login works behind the
  proxy. The app is reached via its HTTPS name only; the plain-HTTP Umbrel
  dashboard "Open" button is no longer a supported login path. No upstream code
  change and no data migration.


  v4.9.4: Rolls up v4.9.1–v4.9.4 on top of 4.9.0. Headlines: local-node
  impersonation detection (flags RF packets that spoof your connected node's
  identity instead of showing them as your own messages), cross-source Position
  Estimation for nodes that never report GPS, drag-and-drop reordering of the
  Sources list, and a full-height Channels tab. MeshCore gains voltage-based
  low-battery alerts and a Notifications tab. Key fixes: MQTT broker sources
  showing no nodes on the map, telemetry charts distorted by bad-clock nodes,
  iOS PWA Channels layout, and a Map Analysis position-permission gate
  (security). No manual migration needed. Image pinned to
  ghcr.io/yeraze/meshmonitor:4.9.4.


  Highlights since v4.6.6:


  v4.9.4 — impersonation detection + Channels/automation polish

  - Local-node impersonation detection: flags packets/messages that spoof your
    connected node's identity (arriving over RF) with a warning badge, instead
    of rendering them as your own outgoing messages.

  - Full-height Channels tab (single compact controls bar, overflow menu on
    mobile); MeshCore Packet Monitor log export as JSONL.

  - Automation: {DATE}/{TIME} tokens for Auto Announce; airtime-cutoff now lists
    the infrastructure nodes driving the decision; system appearance theme.

  - Fixes: auto-ack {LONG_NAME}/{SHORT_NAME} and {NODECOUNT}/{DIRECTCOUNT}
    tokens resolve correctly; telemetry charts sanitized against bad-clock
    nodes; dashboard map honors Map Pin Style. Security: Map Analysis positions
    endpoint enforces viewOnMap / private-position permissions.


  v4.9.3 — cross-source Position Estimation

  - Position Estimation: plots best-guess locations for nodes that never report
    GPS by pooling traceroute + NeighborInfo geometry across all sources (incl.
    MQTT). Lives in Global Settings as one cross-source job, with a
    Maximum-acceptable-accuracy cutoff and Show-Accuracy gating for the
    uncertainty circles.

  - Sources sidebar: Edit mode for drag-reorder handles + resizable width
    (persisted per browser); stable per-source node count.

  - Fixes: MeshCore companion GPS scale (microdegrees); container watchdog
    health probe on multi-network deployments; MeshCore Notifications scroll.


  v4.9.2 — reorderable Sources + MeshCore Notifications

  - Drag-and-drop reordering of the Sources list on the Unified View (persisted
    server-side, shared across viewers; migration 081).

  - MeshCore sources get a dedicated Notifications tab with inactive-node and
    new-node alerts.

  - Fixes: migrate-db table ordering (SQLite to PG/MySQL); Channels layout on
    installed iOS PWAs; channel reorder no longer bleeds channels between
    MeshCore and Meshtastic sources.


  v4.9.1 — MeshCore low-battery + airtime cutoff source

  - MeshCore voltage-based low-battery alerts (per-user mV threshold, default
    3300 mV).

  - Airtime cutoff can measure Channel Utilization from nearby infrastructure
    (averages the 3 strongest-RSSI 0-hop routers/repeaters) instead of the
    local node.

  - Fixes: MQTT broker source showed no nodes on dashboard/map (HTTP 500 on
    /api/poll); Auto Traceroute match-list preview now honors its filters.


  v4.9.0 — mesh health + polite automations

  - Low-battery alerts for monitored nodes: Apprise / Web Push / Desktop
    notification when a monitored node's battery drops below a configurable
    threshold.

  - Airtime-utilization cutoff: a threshold on the Automation page pauses all
    transmitting automations (auto-traceroute, auto-announce, timers) while the
    connected node's Channel Utilization is high, resuming when the mesh quiets
    down. Live status banner; manual sends are never blocked.

  - Telemetry time-range selector (15m–7d) on the Device Info graphs,
    remembered per browser, with averaging that scales across long windows on
    every database backend.

  - {LAST_HOP} automation variable resolves the last relay node (short name,
    falling back to hex byte) in autoresponder/auto-ack templates.

  - Ignored-node auto-reapply: the per-source ignore list is authoritative,
    re-applying (and re-pushing to the radio) the ignore flag when a device
    drops it.

  - Fixes: MQTT environment telemetry visible again (keys normalized to match
    serial ingestion + migration repairs history); PostgreSQL GROUP BY error
    that returned HTTP 500 on telemetry graphs (Postgres regression test added
    to CI); Apprise second-source UNIQUE constraint; API rate limiter now
    exempts RFC 1918 / loopback IPs.


  v4.8.3 — MeshCore discovery + MQTT bridge Configuration page

  - Discover Nearby Nodes / Discover Repeaters sweep for MeshCore devices in
    zero-hop RF range, and the node now answers inbound discovery requests too.

  - MQTT bridges get a dedicated Configuration page (connection, forwarding,
    subscribe/publish filters with per-bridge publish filter, topic rewrites);
    the per-source edit modal slims down to connection basics.

  - Fixes: MeshCore private key validation at 128 hex chars (accepts
    firmware-exported keys), adding new hashtag channels, and a transport-level
    orphan-reconnect flap on TCP sources.


  v4.8.2 — packet observability

  - Unified Packet Monitor aggregating activity across every connected source,
    plus a MeshCore Packet Monitor (OTA capture via LogRxData) with
    click-to-open packet decoding and hashtag channel support.

  - Telemetry auto-scales current/power units and humanizes uptime; dashboard
    map gains rich per-source/per-protocol node popups and a persisted Show
    Waypoints toggle; configurable traceroute history limit.


  v4.8.1 — TCP stability + automations + security

  - Fixes a deterministic 3×/min reconnect loop on TCP Meshtastic sources: a
    transport-swap race during handleConnected tore down healthy TCP sessions
    ("Transport not initialized"). Relevant if MeshMonitor connects to your node
    over TCP.

  - MeshCore automation suite: Auto-Announce (templated status broadcasts on
    interval/cron), Auto-Responder (regex-matched replies, per-sender cooldown),
    Timer Triggers, and Auto-Acknowledge — all with shared token expansion.

  - Security hardening (CodeQL): polynomial-ReDoS / regex-DoS / log-injection
    fixes, plus MeshCore neighbor publicKey input validation.

  - Translations refresh from Hosted Weblate.


  v4.8.0 — MeshCore path intelligence + MQTT/map fixes

  - Shared MQTT reconnect coordinator: prevents aggregate retry storms when
    multiple publisher-pool clients target the same broker.

  - Map node management: Delete/Purge buttons in the map popup to remove stale
    nodes from the map and database in one click.

  - Auto-upgrade: fixed false circuit-breaker trips when the watchdog upgrade
    actually succeeded (the row no longer stays "pending").

  - Neighbor links now classified by transport type (RF / UDP / unknown) and
    filterable on the map.

  - MeshCore (não usado em deployments só-Meshtastic): Show Paths with
    hop-count colored lines, Discover Path + auto-pathfinding automation tab,
    repeater neighbor collection, @mention highlighting + delivery status in
    DMs, node search/navigation, and a mobile-responsive layout.


  v4.7.4 — MeshCore protocol + multi-source

  - MQTT Bridge can now be created without a pre-existing Broker source.

  - Copy NodeInfo from another source — enriches a node's name/keys across
    sources for cross-source PKI DM and NodeDB pre-population.

  - Clipboard operations fall back gracefully in non-HTTPS contexts (useful
    when accessing MeshMonitor over plain HTTP on the LAN).

  - MeshCore Tier 1/2: contact remove/export/import via meshcore:// URLs,
    repeater neighbour lists, device time sync, danger-gated reboot, Ed25519
    key backup/restore, room server integration, per-hop SNR trace, TX power
    config in the UI.


  v4.7.3 — MQTT bridge enhancements + per-source fixes

  - MQTT bridge: per-gateway publisher pool (default on), honors the ok_to_mqtt
    bit on uplink (default on), and direction-mode dropdown for quiet
    publish-only public servers.

  - Message sorting uses server-side receipt time instead of the sender clock,
    preventing out-of-order display from nodes with bad RTCs.

  - Per-source scoping fixes: security-key display in Device Configuration,
    channel-database visibility, and permission-grid rendering now respect the
    active source.

  - Connection permission split into separate Read/Write checkboxes; unified
    pages can be set as the default landing destination.

  - Auto-upgrade check is skipped while migrations are still running.


  v4.7.2 — Channel DB robustness + validation

  - Import channels from a Meshtastic URL: paste a meshtastic.org/e/# link and
    select which channels to save as virtual decryption-key rows.

  - MQTT bridge direction mode (publish_only / subscribe_only / bidirectional)
    silences permission-denied spam on public servers that reject SUBSCRIBE.

  - Channel Database no longer crashes the MQTT default-channel bootstrap on
    pre-v3.7 SQLite installs (migration 071 drops the legacy psk_length CHECK
    constraint; no-op for fresh / PG / MySQL installs).

  - Messages now sort by server-side receipt time, so nodes with bad clocks
    (year 1970 / 2065) no longer sink to the bottom of channel and DM lists.

  - Hardening: destination routes reject out-of-range nodeNum and resolve
    64-hex publicKey lookups (fixes a Postgres bigint overflow crash). API
    note: destination fields now return HTTP 400 for malformed inputs.


  v4.7.1 — per-source Channels fix

  - The per-source Channels tab no longer inflates its list with global Channel
    Database rows (server-side MQTT decryption PSKs). A Sandbox source with 3
    real channels stops showing ~25 unrelated MQTT-bridge channel names.


  v4.7.0 — MeshCore Remote Administration + MQTT topic rewriting

  - MeshCore Remote Administration: full CLI-over-encrypted-DM admin surface for
    distant Repeaters / Room Servers, plus an in-app console for the local
    device. Encrypted password store with rotation detection, typed-name
    confirmation for destructive commands, ACL setperm form, and a per-command
    audit log. Gated by a new per-source remote_admin permission (admins pass
    automatically). Saving passwords requires SESSION_SECRET set explicitly.

  - MQTT bridge topic rewriting (cross-mesh prefix replacement), configured from
    the broker's edit modal so one dialog covers every bridge on that broker.

  - MQTT dashboard restored: broker and bridge sources fall through to the full
    Meshtastic dashboard (Channels / Telemetry / DMs / Map) again, reverting the
    experimental thin per-source shell.

  - Migration 070 adds a nullable adminCredential column to meshcore_nodes.


  v4.6.6 — bug fixes + blog/docs polish

  - Show UDP / Show RF map filters now correctly hide neighbor-info lines.

  - Router role in Remote Admin → Device Configuration no longer silently
    reverts; the fragile native confirm() was replaced with a persistent inline
    warning banner.

  - The red "auto-upgrade halted" banner now self-heals after a successful
    auto-update completes (clears on the next status poll).


  v4.6.5 — MQTT Bridge dashboard + cross-source fixes

  - MQTT Bridge sources get their own "Open" button rendering a read-only mirror
    of the Meshtastic dashboard — every transmit surface (send composers, DM
    action buttons, Device Config, Remote Admin, Automation) is suppressed since
    bridges ingest but never send.

  - MeshCore telemetry tab added to the source-agnostic dashboard.

  - Unified Nodes view now merges per-source rows by nodeNum — a node heard on
    both an RF source and an MQTT-bridged source no longer appears twice (once
    labeled, once as "Node <num>"); newest lastHeard wins, empty fields are
    back-filled, favorite/ignored flags OR'd across sources.

  - DM no longer flags PKI when keyMismatchDetected (firmware may legitimately
    lack the key after a purge — flagging marked valid sessions as compromised).

  - Standalone mqtt_bridge sources are now valid client-proxy mqttLink targets.


  v4.6.4 — MeshCore path management + Passive Mode + MQTT key fix

  - MeshCore per-contact forwarding path is now persisted (migration 068),
    visible on the contact detail panel (Hops Away + Path bytes), and can be
    Reset, Shared, live-updated via debounced PathUpdated pushes, or manually
    edited via the feature-flagged meshcoreAdvancedPathEdit setting.

  - Passive Mode stability on large Meshtastic TCP networks: per-source manual
    Resync action, startup-grace fast reconnect, per-source staleness override,
    and createdAt-based chat ordering.

  - Critical fix: MQTT-ingested publicKey values were stored as hex while every
    other path (serial/TCP/security handshake) used base64, silently triggering
    false-positive "Key mismatch detected" warnings on every NodeInfo arrival
    for MQTT-seen nodes. Migration 069 backfills existing hex rows to base64
    (idempotent across SQLite / PostgreSQL / MySQL).

  - Per-transport visibility toggles: filter the dashboard map and packet
    monitor by RF / UDP / MQTT independently.

  - New v1 API node-action endpoints, multi-response HTTP auto-responder
    triggers, and per-message source attribution (source_ip / source_path
    columns).

  - Safari/iOS text inputs now stay visible above the keyboard accessory bar.

  - MQTT ingest: suppressed duplicate-packet WARN spam.


  v4.6.3 — MQTT permissions + map visibility

  - MQTT ingest now stamps node.channel via channel_database so the map filter
    honors Virtual Channel Permissions. Previously anonymous and non-admin
    viewers saw zero nodes on the map for MQTT sources regardless of what was
    granted.

  - /traceroutes and /neighbor-info endpoints are now channel-gated — no more
    "floating lines" between coordinates of nodes the user can't see.

  - MeshCore contacts are mirrored to meshcore_nodes on ingest so the remote-
    telemetry scheduler correctly classifies repeater targets.

  - Unified Messages preserves tapback metadata (emoji, replyId) across multi-
    source merges — reactions stop flickering between emoji pills and full
    inline messages.

  - Puppeteer install failure fixed on Linux LXC / Raspbian baremetal (skips
    Chrome download via .npmrc).

  - Opt-in MQTT-broker zero-hop injection mode prevents RF rebroadcast of
    MQTT-bridged packets.

  - Scroll-position-aware infinite scrollback for MeshCore channels with a
    "Jump to Bottom" button.


  v4.6.2 — full MQTT ingest + channel UX

  - MQTT bridges and brokers now ingest the complete set of Meshtastic portnums
    (text, telemetry, position, nodeinfo, traceroute, neighbor info, paxcounter,
    store-and-forward) with proper per-source attribution and server-side
    channel decryption. TCP + MQTT receptions of the same packet now dedup into
    a single Unified Messages entry.

  - Empty-named slot 0 displays as the modem preset's firmware label
    (MediumFast, LongFast, etc.) instead of the synthetic "Primary".

  - Channel Database is now genuinely global (PSKs apply across all sources);
    management moved to Global Settings.

  - MeshCore repeater telemetry restored via SendStatusReq + guest-login
    fallback.

  - Desktop first-run no longer requires a Meshtastic IP.


  v4.6.1 — Meshcore stability + MQTT resilience

  - Meshcore telemetry graphs rendered in DM contact-detail pane.

  - MQTT source editor preserves saved password when field is left blank.

  - MQTT broker ACL restrictions detected and surfaced to the user.

  - mqtt_bridge sources gained a "Prune Outside ROI" maintenance action.

  - MeshCorePage layout fix (fills the dashboard shell).

  - Correct DeviceInfo decoding for nodes that pack a NUL-separated remainder.


  IMPORTANT: Login as admin / changeme on first boot and change the password
  immediately. Configure your Meshtastic node IP via Dashboard → Sources after
  installation.
