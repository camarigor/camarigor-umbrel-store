releaseNotes: >-
  v4.3.2: Initial release on the Camarigor store. Uses the upstream
  `ghcr.io/yeraze/meshmonitor:latest` image. Exposed on port 9003. CORS
  preconfigured to allow access via http://umbrel.local:9003 and the
  Umbrel host IP. SQLite database persisted via a named volume so app
  uninstall/reinstall preserves history.


  IMPORTANT: Login as admin / changeme on first boot and change the
