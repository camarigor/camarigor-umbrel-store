version: "3.7"

services:
  camarigor-sonarqube-db:
    image: postgres:17-alpine
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: 507515c1cfcfcb2b56420b2a2fccd7fdf37cefd865e25abde96fe6ca53eaeee8
      TZ: America/Sao_Paulo
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$POSTGRES_PASSWORD psql -h camarigor-sonarqube-db -U sonar -d sonar -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  sonarqube-init:
    image: busybox:stable
    user: "0"
    read_only: true
    security_opt:
      - no-new-privileges:true
    command: ["sh", "-c", "chown -R 1000:1000 /sonarqube-data /sonarqube-extensions /sonarqube-logs"]
    volumes:
      - ${APP_DATA_DIR}/sonarqube/data:/sonarqube-data
      - ${APP_DATA_DIR}/sonarqube/extensions:/sonarqube-extensions
      - ${APP_DATA_DIR}/sonarqube/logs:/sonarqube-logs

  sonarqube:
    image: sonarqube:community
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      camarigor-sonarqube-db:
        condition: service_healthy
      sonarqube-init:
        condition: service_completed_successfully
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://camarigor-sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: 507515c1cfcfcb2b56420b2a2fccd7fdf37cefd865e25abde96fe6ca53eaeee8
      TZ: America/Sao_Paulo
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${APP_DATA_DIR}/sonarqube/data:/opt/sonarqube/data
      - ${APP_DATA_DIR}/sonarqube/extensions:/opt/sonarqube/extensions
      - ${APP_DATA_DIR}/sonarqube/logs:/opt/sonarqube/logs
