version: "3.7"

services:
  db:
    image: postgres:17-alpine
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: 507515c1cfcfcb2b56420b2a2fccd7fdf37cefd865e25abde96fe6ca53eaeee8
      TZ: America/Sao_Paulo
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sonarqube:
    image: sonarqube:community
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: 507515c1cfcfcb2b56420b2a2fccd7fdf37cefd865e25abde96fe6ca53eaeee8
      TZ: America/Sao_Paulo
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${APP_DATA_DIR}/sonarqube/data:/opt/sonarqube/data
      - ${APP_DATA_DIR}/sonarqube/extensions:/opt/sonarqube/extensions
      - ${APP_DATA_DIR}/sonarqube/logs:/opt/sonarqube/logs
