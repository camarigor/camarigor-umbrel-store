releaseNotes: >-
  v1.0.4: renamed the database service from `db` to
  `camarigor-sonarqube-db` to avoid Docker DNS collision on Umbrel's
  shared `umbrel_main_network`. Multiple Umbrel apps (Forgejo, Kan,
  others) also use `db` as their service name; on a shared network,
  Docker DNS round-robins between all containers sharing that alias,
  so connections to `db` from inside our app would land on the wrong
  Postgres ~2/3 of the time, causing seemingly random auth failures.
  Using a unique service name eliminates the collision entirely. This
  was the actual root cause behind the auth flakiness that v1.0.3 tried
  to work around with a smarter healthcheck.


  v1.0.3: changed the `db` healthcheck from `pg_isready` to a real
  scram-sha-256 authenticated query (`psql ... SELECT 1`) so the
  `service_healthy` condition only becomes true once Postgres can
  actually accept authenticated TCP connections. (NOTE in v1.0.4: this
  did not fix the underlying issue, since the auth failures were caused
  by hitting the wrong Postgres entirely — see v1.0.4. The robust
  healthcheck is still useful for catching real auth issues earlier.)


  v1.0.2: added `sonarqube-init` busybox container that fixes ownership
  of the SonarQube data/extensions/logs bind-mount directories (chown to
  uid 1000) before the SonarQube service starts. Without this, the
  embedded Elasticsearch fails to create its config dir because Umbrel
  creates the bind-mount paths as root, and the official SonarQube image
  runs as uid 1000 (and does not self-chown like Postgres does).


  v1.0.1: removed `sysctls: vm.max_map_count` from compose. The Docker
  runtime rejects setting that sysctl in container scope by policy
  (regardless of kernel version), causing the v1.0.0 install to fail.
  Debian-based Umbrel hosts ship with `vm.max_map_count = 1048576`
  persistent in `/usr/lib/sysctl.d/50-default.conf` (well above the
  Elasticsearch minimum of 262144), so the embedded Elasticsearch in
  SonarQube reads the host value and starts cleanly.


  Host requirement: `vm.max_map_count >= 262144` must be set on the host.
  Default on modern systemd-based distros (Debian 12+, Ubuntu 22.04+).
  If your host is different, add it via `/etc/sysctl.d/99-sonarqube.conf`
  before installing.


  IMPORTANT: First login is admin / admin. SonarQube will require you to
  change the password immediately on first login. Do it.


  First boot takes 2-3 minutes while Elasticsearch initializes — be patient
  before opening the UI.


  Make sure your Umbrel has at least 4 GB of free RAM before installing.
