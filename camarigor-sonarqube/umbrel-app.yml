dependencies: []
port: 9000
gallery: []
path: ""
defaultUsername: "admin"
defaultPassword: "admin"
releaseNotes: >-
  v1.0.0 (initial release): SonarQube Community on Umbrel with Postgres 17.


  IMPORTANT: First login is admin / admin. SonarQube will require you to change
  the password immediately on first login. Do it.


  First boot takes 2-3 minutes while Elasticsearch initializes — be patient
  before opening the UI.


  Make sure your Umbrel has at least 4 GB of free RAM before installing.
