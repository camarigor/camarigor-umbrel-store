id: camarigor-sonarqube
category: developer
name: SonarQube Server
version: "1.0.4"
tagline: Self-hosted code quality and static analysis platform (Community)
icon: https://raw.githubusercontent.com/camarigor/camarigor-umbrel-store/main/camarigor-sonarqube/icon.png
description: >-
  SonarQube Server Community Edition packaged for Umbrel, with PostgreSQL 17
  as backing database.


  SonarQube performs continuous static analysis of source code to detect bugs,
  security vulnerabilities, code smells, and to track code coverage and
  duplications across many programming languages.


  Features:

  - Static analysis for 30+ languages out of the box

  - Issue tracking with severity, type, and status

  - Quality Gates for CI/CD enforcement

  - Pull-request decoration via webhooks

  - Plugin marketplace for additional rules and integrations


  Resource requirements:

  - At least 4 GB of free RAM is recommended on first boot.

  - First boot may take 2-3 minutes while Elasticsearch initializes.


  IMPORTANT: After installation, log in with admin / admin and CHANGE THE
  ADMIN PASSWORD IMMEDIATELY when SonarQube prompts you.
