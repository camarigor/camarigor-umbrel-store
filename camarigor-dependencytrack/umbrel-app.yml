manifestVersion: 1
id: camarigor-dependencytrack
category: developer
name: Dependency-Track
version: "1.0.0"
tagline: Self-hosted SBOM platform for software composition analysis (OWASP)
icon: https://raw.githubusercontent.com/camarigor/camarigor-umbrel-store/main/camarigor-dependencytrack/icon.png
description: >-
  OWASP Dependency-Track is an intelligent component analysis platform that
  helps organizations identify and reduce risk in their software supply chain.


  This package uses the official `dependencytrack/bundled` image, which
  combines the API server and the Vue.js frontend in a single container with
  internal nginx routing. PostgreSQL 17 is used as the backing database.


  Features:

  - SBOM ingestion (CycloneDX, SPDX) via REST API

  - Vulnerability identification across NVD, OSV, GitHub Advisory, Snyk

  - Continuous monitoring of components for new vulnerabilities

  - Policy engine for license, severity, and inheritance compliance

  - Auditing workflow with state tracking (e.g. exploitable, not affected)

  - REST API with token auth — CI/CD friendly (post your SBOMs to /api/v1/bom)

  - Notification publishers (Slack, Teams, email, webhook)


  Resource requirements:

  - At least 4 GB of free RAM is recommended.

  - First boot may take 30s-1min for schema migration on Postgres.


  IMPORTANT: After installation, log in with admin / admin and CHANGE THE
  ADMIN PASSWORD IMMEDIATELY when Dependency-Track prompts you.


  CI/CD: API endpoints are available on the same port (9001) under /api/v1/*.
  Generate API tokens via UI (Administration > Access Management > Teams >
  click team > API key tab) and POST SBOMs to /api/v1/bom with header
  `X-API-Key: <token>`.
