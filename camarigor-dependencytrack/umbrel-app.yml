releaseNotes: >-
  v1.0.0 (initial release): OWASP Dependency-Track on Umbrel using the
  official `dependencytrack/bundled` image (API + UI in one container) with
  PostgreSQL 17 backing database.


  IMPORTANT: First login is admin / admin. Dependency-Track will require you
  to change the password immediately on first login. Do it.


  First boot takes 30s-1min while Postgres schema migrates and the apiserver
